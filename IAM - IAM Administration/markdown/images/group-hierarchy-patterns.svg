<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <linearGradient id="ghpBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ghpGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="ghpShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Group Hierarchy Patterns</text>
  <text x="350" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Flat vs. nested group structures</text>

  <!-- Left: Flat Pattern -->
  <rect x="30" y="70" width="310" height="290" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#ghpShadow)"/>
  <rect x="30" y="70" width="310" height="35" rx="8" fill="url(#ghpBlueGrad)"/>
  <rect x="30" y="95" width="310" height="10" fill="url(#ghpBlueGrad)"/>
  <text x="185" y="95" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Flat Pattern</text>

  <!-- Flat groups -->
  <rect x="50" y="125" width="120" height="35" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="110" y="147" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">dt-platform-admins</text>

  <rect x="190" y="125" width="130" height="35" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="255" y="147" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">dt-checkout-editors</text>

  <rect x="50" y="175" width="120" height="35" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="110" y="197" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">dt-catalog-viewers</text>

  <rect x="190" y="175" width="130" height="35" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="255" y="197" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">dt-security-viewers</text>

  <rect x="50" y="225" width="120" height="35" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="110" y="247" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">dt-payments-admins</text>

  <rect x="190" y="225" width="130" height="35" rx="4" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="255" y="247" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">dt-oncall-responders</text>

  <!-- Flat pros/cons -->
  <text x="50" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+ Simple to understand</text>
  <text x="50" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+ Easy to audit</text>
  <text x="50" y="310" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">- Many groups to manage</text>
  <text x="50" y="325" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">- No inheritance</text>
  <text x="50" y="345" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#475569">Best for: &lt; 50 groups</text>

  <!-- Right: Nested Pattern -->
  <rect x="360" y="70" width="310" height="290" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#ghpShadow)"/>
  <rect x="360" y="70" width="310" height="35" rx="8" fill="url(#ghpGreenGrad)"/>
  <rect x="360" y="95" width="310" height="10" fill="url(#ghpGreenGrad)"/>
  <text x="515" y="95" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Nested Pattern</text>

  <!-- Parent group -->
  <rect x="430" y="120" width="170" height="30" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="515" y="140" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">dt-all-users</text>

  <!-- Child groups level 1 -->
  <line x1="515" y1="150" x2="515" y2="165" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="430" y1="165" x2="600" y2="165" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="430" y1="165" x2="430" y2="175" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="515" y1="165" x2="515" y2="175" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="600" y1="165" x2="600" y2="175" stroke="#16a34a" stroke-width="1.5"/>

  <rect x="380" y="175" width="100" height="28" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="430" y="193" font-family="system-ui, sans-serif" font-size="10" fill="#047857" text-anchor="middle">dt-admins</text>

  <rect x="465" y="175" width="100" height="28" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="515" y="193" font-family="system-ui, sans-serif" font-size="10" fill="#047857" text-anchor="middle">dt-editors</text>

  <rect x="550" y="175" width="100" height="28" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="600" y="193" font-family="system-ui, sans-serif" font-size="10" fill="#047857" text-anchor="middle">dt-viewers</text>

  <!-- Child groups level 2 -->
  <line x1="430" y1="203" x2="430" y2="220" stroke="#10b981" stroke-width="1"/>
  <line x1="400" y1="220" x2="460" y2="220" stroke="#10b981" stroke-width="1"/>
  <line x1="400" y1="220" x2="400" y2="230" stroke="#10b981" stroke-width="1"/>
  <line x1="460" y1="220" x2="460" y2="230" stroke="#10b981" stroke-width="1"/>

  <rect x="370" y="230" width="60" height="25" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="1"/>
  <text x="400" y="247" font-family="system-ui, sans-serif" font-size="9" fill="#059669" text-anchor="middle">platform</text>

  <rect x="430" y="230" width="60" height="25" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="1"/>
  <text x="460" y="247" font-family="system-ui, sans-serif" font-size="9" fill="#059669" text-anchor="middle">security</text>

  <!-- Nested pros/cons -->
  <text x="380" y="280" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+ Inheritance reduces work</text>
  <text x="380" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+ Scales well</text>
  <text x="380" y="310" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">- Complex to trace</text>
  <text x="380" y="325" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">- Can over-grant</text>
  <text x="380" y="345" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#475569">Best for: 50+ groups</text>
</svg>
