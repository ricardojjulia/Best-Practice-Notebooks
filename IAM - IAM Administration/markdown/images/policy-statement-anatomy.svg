<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <linearGradient id="psaBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="psaShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Policy Statement Anatomy</text>
  <text x="350" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Understanding policy statement components</text>

  <!-- Main policy box -->
  <rect x="50" y="75" width="600" height="120" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#psaShadow)"/>
  <rect x="50" y="75" width="600" height="35" rx="8" fill="url(#psaBlueGrad)"/>
  <rect x="50" y="100" width="600" height="10" fill="url(#psaBlueGrad)"/>
  <text x="350" y="98" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Policy Statement Example</text>

  <!-- Policy code -->
  <rect x="70" y="125" width="560" height="55" rx="4" fill="#1e293b"/>
  <text x="85" y="147" font-family="monospace" font-size="12" fill="#22d3ee">ALLOW</text>
  <text x="140" y="147" font-family="monospace" font-size="12" fill="#fbbf24">storage:logs:read</text>
  <text x="85" y="167" font-family="monospace" font-size="12" fill="#a78bfa">WHERE</text>
  <text x="140" y="167" font-family="monospace" font-size="12" fill="#4ade80">storage:table-name = "logs"</text>

  <!-- Component labels with arrows -->
  <!-- Effect -->
  <rect x="50" y="210" width="100" height="70" rx="6" fill="#ecfeff" stroke="#06b6d4" stroke-width="1"/>
  <text x="100" y="235" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#0891b2" text-anchor="middle">Effect</text>
  <text x="100" y="255" font-family="system-ui, sans-serif" font-size="10" fill="#0e7490" text-anchor="middle">ALLOW or</text>
  <text x="100" y="270" font-family="system-ui, sans-serif" font-size="10" fill="#0e7490" text-anchor="middle">DENY</text>
  <line x1="100" y1="147" x2="100" y2="205" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Permission -->
  <rect x="175" y="210" width="130" height="70" rx="6" fill="#fef9c3" stroke="#eab308" stroke-width="1"/>
  <text x="240" y="235" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#a16207" text-anchor="middle">Permission</text>
  <text x="240" y="255" font-family="system-ui, sans-serif" font-size="10" fill="#a16207" text-anchor="middle">service:resource:action</text>
  <text x="240" y="270" font-family="system-ui, sans-serif" font-size="10" fill="#a16207" text-anchor="middle">(e.g., logs:read)</text>
  <line x1="240" y1="147" x2="240" y2="205" stroke="#eab308" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Condition Keyword -->
  <rect x="330" y="210" width="100" height="70" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1"/>
  <text x="380" y="235" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed" text-anchor="middle">Condition</text>
  <text x="380" y="255" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">WHERE clause</text>
  <text x="380" y="270" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">(optional)</text>
  <line x1="380" y1="167" x2="380" y2="205" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Condition Value -->
  <rect x="455" y="210" width="140" height="70" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="525" y="235" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#16a34a" text-anchor="middle">Condition Value</text>
  <text x="525" y="255" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle">attribute = value</text>
  <text x="525" y="270" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle">restricts scope</text>
  <line x1="525" y1="167" x2="525" y2="205" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Example patterns -->
  <text x="350" y="310" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1e293b" text-anchor="middle">Common Permission Patterns</text>

  <rect x="50" y="325" width="190" height="40" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="145" y="340" font-family="monospace" font-size="10" fill="#334155" text-anchor="middle">storage:logs:read</text>
  <text x="145" y="355" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Read log data</text>

  <rect x="255" y="325" width="190" height="40" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="340" font-family="monospace" font-size="10" fill="#334155" text-anchor="middle">settings:objects:write</text>
  <text x="350" y="355" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Modify configuration</text>

  <rect x="460" y="325" width="190" height="40" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="555" y="340" font-family="monospace" font-size="10" fill="#334155" text-anchor="middle">environment:roles:*</text>
  <text x="555" y="355" font-family="system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">All env role actions</text>
</svg>
