<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <linearGradient id="bgGradWF1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="triggerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="conditionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadowWF1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWF1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradWF1)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Workflow Execution Flow</text>

  <!-- Main Flow Boxes -->

  <!-- Trigger -->
  <rect x="50" y="70" width="120" height="80" rx="10" fill="url(#triggerGrad)" filter="url(#shadowWF1)"/>
  <text x="110" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Trigger</text>
  <text x="110" y="120" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="10">Event fires</text>
  <text x="110" y="135" text-anchor="middle" fill="#fde68a" font-family="system-ui, sans-serif" font-size="9">Davis/Schedule/Manual</text>

  <!-- Arrow 1 -->
  <line x1="175" y1="110" x2="215" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWF1)"/>

  <!-- Tasks -->
  <rect x="220" y="70" width="120" height="80" rx="10" fill="url(#taskGrad)" filter="url(#shadowWF1)"/>
  <text x="280" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Tasks</text>
  <text x="280" y="120" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="10">Execute actions</text>
  <text x="280" y="135" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="9">HTTP/JS/Notify/Query</text>

  <!-- Arrow 2 -->
  <line x1="345" y1="110" x2="385" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWF1)"/>

  <!-- Conditions -->
  <rect x="390" y="70" width="120" height="80" rx="10" fill="url(#conditionGrad)" filter="url(#shadowWF1)"/>
  <text x="450" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Conditions</text>
  <text x="450" y="120" text-anchor="middle" fill="#ddd6fe" font-family="system-ui, sans-serif" font-size="10">Evaluate logic</text>
  <text x="450" y="135" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="9">Branch/Skip/Continue</text>

  <!-- Arrow 3 -->
  <line x1="515" y1="110" x2="555" y2="110" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWF1)"/>

  <!-- Results -->
  <rect x="560" y="70" width="120" height="80" rx="10" fill="url(#resultGrad)" filter="url(#shadowWF1)"/>
  <text x="620" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Results</text>
  <text x="620" y="120" text-anchor="middle" fill="#a7f3d0" font-family="system-ui, sans-serif" font-size="10">Capture output</text>
  <text x="620" y="135" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="9">Success/Fail/Timeout</text>

  <!-- Details Section -->
  <rect x="50" y="180" width="600" height="150" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>

  <!-- Trigger Details -->
  <text x="70" y="205" fill="#f59e0b" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Triggers</text>
  <text x="70" y="225" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Davis Problem</text>
  <text x="70" y="240" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Davis Event</text>
  <text x="70" y="255" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Schedule</text>
  <text x="70" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">On-Demand</text>
  <text x="70" y="285" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Event (Custom)</text>

  <!-- Task Details -->
  <text x="210" y="205" fill="#818cf8" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Task Types</text>
  <text x="210" y="225" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Slack/Teams/Email</text>
  <text x="210" y="240" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">HTTP Request</text>
  <text x="210" y="255" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Run JavaScript</text>
  <text x="210" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">DQL Query</text>
  <text x="210" y="285" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">ServiceNow/Jira</text>

  <!-- Condition Details -->
  <text x="370" y="205" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Expressions</text>
  <text x="370" y="225" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">{{ event()["field"] }}</text>
  <text x="370" y="240" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">{{ result("task").output }}</text>
  <text x="370" y="255" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">{{ env.SECRET }}</text>
  <text x="370" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Jinja2 syntax</text>
  <text x="370" y="285" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">Boolean conditions</text>

  <!-- Result Details -->
  <text x="530" y="205" fill="#34d399" font-family="system-ui, sans-serif" font-size="11" font-weight="600">States</text>
  <text x="530" y="225" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">RUNNING</text>
  <text x="530" y="240" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">SUCCEEDED</text>
  <text x="530" y="255" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">FAILED</text>
  <text x="530" y="270" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">CANCELLED</text>
  <text x="530" y="285" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">TIMED_OUT</text>
</svg>
