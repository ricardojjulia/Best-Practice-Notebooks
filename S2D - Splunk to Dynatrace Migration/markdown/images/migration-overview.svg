<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bgGradS2D1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="splunkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#65a30d"/>
      <stop offset="100%" style="stop-color:#4d7c0f"/>
    </linearGradient>
    <linearGradient id="dtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="arrowGradS2D" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#65a30d"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="shadowS2D1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowS2D1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradS2D1)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Splunk to Dynatrace Migration Overview</text>

  <!-- Splunk Box -->
  <rect x="40" y="60" width="200" height="280" rx="12" fill="url(#splunkGrad)" filter="url(#shadowS2D1)"/>
  <text x="140" y="90" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Splunk</text>

  <!-- Splunk Components -->
  <rect x="55" y="110" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="140" y="133" text-anchor="middle" fill="#a3e635" font-family="system-ui, sans-serif" font-size="11">SPL Queries</text>

  <rect x="55" y="155" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="140" y="178" text-anchor="middle" fill="#a3e635" font-family="system-ui, sans-serif" font-size="11">Scheduled Alerts</text>

  <rect x="55" y="200" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="140" y="223" text-anchor="middle" fill="#a3e635" font-family="system-ui, sans-serif" font-size="11">Dashboards</text>

  <rect x="55" y="245" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="140" y="268" text-anchor="middle" fill="#a3e635" font-family="system-ui, sans-serif" font-size="11">Reports</text>

  <rect x="55" y="290" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="140" y="313" text-anchor="middle" fill="#a3e635" font-family="system-ui, sans-serif" font-size="11">Indexes</text>

  <!-- Migration Arrow -->
  <rect x="260" y="175" width="180" height="50" rx="8" fill="url(#arrowGradS2D)" opacity="0.3"/>
  <path d="M 270 200 L 420 200" stroke="url(#arrowGradS2D)" stroke-width="3" marker-end="url(#arrowS2D1)"/>
  <text x="350" y="195" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Migration</text>
  <text x="350" y="215" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">S2D Series</text>

  <!-- Dynatrace Box -->
  <rect x="460" y="60" width="200" height="280" rx="12" fill="url(#dtGrad)" filter="url(#shadowS2D1)"/>
  <text x="560" y="90" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="16" font-weight="600">Dynatrace</text>

  <!-- Dynatrace Components -->
  <rect x="475" y="110" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="560" y="133" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11">DQL Queries</text>

  <rect x="475" y="155" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="560" y="178" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11">Davis Anomaly Detectors</text>

  <rect x="475" y="200" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="560" y="223" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11">Dashboards</text>

  <rect x="475" y="245" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="560" y="268" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11">Workflows</text>

  <rect x="475" y="290" width="170" height="35" rx="6" fill="#1e293b"/>
  <text x="560" y="313" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11">Buckets (Grail)</text>

  <!-- Notebook References -->
  <rect x="40" y="355" width="620" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="350" y="377" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">S2D-02: Logs | S2D-03: Queries | S2D-04: Anomaly Detectors | S2D-05: Workflows | S2D-08: Dashboards</text>
</svg>
