<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="devGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="stagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="prodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="sourceBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="targetBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Phased Agent Migration Sequence</text>

  <!-- Timeline axis -->
  <line x1="120" y1="62" x2="660" y2="62" stroke="#475569" stroke-width="1"/>

  <!-- Week markers -->
  <text x="120" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 0</text>
  <line x1="120" y1="58" x2="120" y2="66" stroke="#475569" stroke-width="1"/>

  <text x="210" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 1</text>
  <line x1="210" y1="58" x2="210" y2="66" stroke="#475569" stroke-width="1"/>

  <text x="300" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 2</text>
  <line x1="300" y1="58" x2="300" y2="66" stroke="#475569" stroke-width="1"/>

  <text x="390" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 3</text>
  <line x1="390" y1="58" x2="390" y2="66" stroke="#475569" stroke-width="1"/>

  <text x="480" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 4</text>
  <line x1="480" y1="58" x2="480" y2="66" stroke="#475569" stroke-width="1"/>

  <text x="570" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 5</text>
  <line x1="570" y1="58" x2="570" y2="66" stroke="#475569" stroke-width="1"/>

  <text x="660" y="55" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Week 6</text>
  <line x1="660" y1="58" x2="660" y2="66" stroke="#475569" stroke-width="1"/>

  <!-- Phase labels -->
  <text x="60" y="104" text-anchor="end" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Phase 1</text>
  <text x="60" y="118" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Dev</text>

  <text x="60" y="154" text-anchor="end" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Phase 2</text>
  <text x="60" y="168" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Staging</text>

  <text x="60" y="204" text-anchor="end" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Phase 3</text>
  <text x="60" y="218" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Production</text>

  <!-- Phase 1: Dev (Week 1-2) -->
  <rect x="210" y="90" width="180" height="30" rx="6" fill="url(#devGrad)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="300" y="110" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Dev Agents Migrate</text>

  <!-- Phase 2: Staging (Week 3-4) -->
  <rect x="390" y="140" width="180" height="30" rx="6" fill="url(#stagGrad)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="480" y="160" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Staging Agents Migrate</text>

  <!-- Phase 3: Production (Week 5-6) -->
  <rect x="570" y="190" width="90" height="30" rx="6" fill="url(#prodGrad)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="615" y="210" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Prod Migrate</text>

  <!-- Divider -->
  <line x1="40" y1="245" x2="660" y2="245" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Agent volume section -->
  <text x="350" y="268" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Agent Volume Over Time</text>

  <!-- Source Tenant shrinking bar -->
  <text x="60" y="298" text-anchor="end" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Source</text>
  <text x="60" y="310" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Tenant</text>

  <!-- Source bars (shrinking) -->
  <rect x="120" y="288" width="90" height="24" rx="4" fill="#ef4444" opacity="0.8"/>
  <text x="165" y="305" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">100%</text>

  <rect x="210" y="288" width="90" height="24" rx="4" fill="#ef4444" opacity="0.65"/>
  <text x="255" y="305" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">100%</text>

  <rect x="300" y="288" width="68" height="24" rx="4" fill="#ef4444" opacity="0.5"/>
  <text x="334" y="305" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">75%</text>

  <rect x="390" y="288" width="68" height="24" rx="4" fill="#ef4444" opacity="0.4"/>
  <text x="424" y="305" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">75%</text>

  <rect x="480" y="288" width="34" height="24" rx="4" fill="#ef4444" opacity="0.3"/>
  <text x="497" y="305" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">35%</text>

  <rect x="570" y="288" width="14" height="24" rx="4" fill="#ef4444" opacity="0.2"/>

  <!-- Target Tenant growing bar -->
  <text x="60" y="348" text-anchor="end" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Target</text>
  <text x="60" y="360" text-anchor="end" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Tenant</text>

  <!-- Target bars (growing) -->
  <rect x="210" y="338" width="14" height="24" rx="4" fill="#10b981" opacity="0.3"/>

  <rect x="300" y="338" width="22" height="24" rx="4" fill="#10b981" opacity="0.5"/>
  <text x="311" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">25%</text>

  <rect x="390" y="338" width="22" height="24" rx="4" fill="#10b981" opacity="0.6"/>
  <text x="401" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="9">25%</text>

  <rect x="480" y="338" width="56" height="24" rx="4" fill="#10b981" opacity="0.75"/>
  <text x="508" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">65%</text>

  <rect x="570" y="338" width="90" height="24" rx="4" fill="#10b981" opacity="0.9"/>
  <text x="615" y="355" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="10">100%</text>

  <!-- Diagonal arrow showing migration direction -->
  <path d="M165,316 L615,336" stroke="#475569" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <polygon points="612,332 620,338 610,340" fill="#475569"/>

  <!-- Footer -->
  <text x="350" y="390" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="9">Phased Agent Migration - Minimizing Risk with Incremental Cutover</text>
</svg>