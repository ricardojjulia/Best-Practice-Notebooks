<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <linearGradient id="clusterEntityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#326ce5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e4a9e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeEntityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nsEntityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="workloadEntityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pgiEntityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serviceEntityGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- Title -->
  <text x="350" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#f1f5f9" text-anchor="middle">Dynatrace Entity Model for Kubernetes</text>

  <!-- KUBERNETES_CLUSTER -->
  <rect x="250" y="50" width="200" height="50" rx="8" fill="url(#clusterEntityGrad)" filter="url(#shadow)"/>
  <text x="350" y="72" font-family="monospace" font-size="10" fill="#bfdbfe" text-anchor="middle">dt.entity.kubernetes_cluster</text>
  <text x="350" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">KUBERNETES_CLUSTER</text>

  <!-- Branch lines from cluster -->
  <line x1="300" y1="100" x2="300" y2="140" stroke="#64748b" stroke-width="2"/>
  <line x1="400" y1="100" x2="400" y2="140" stroke="#64748b" stroke-width="2"/>

  <!-- KUBERNETES_NODE -->
  <rect x="100" y="150" width="200" height="50" rx="8" fill="url(#nodeEntityGrad)" filter="url(#shadow)"/>
  <text x="200" y="172" font-family="monospace" font-size="10" fill="#c7d2fe" text-anchor="middle">dt.entity.kubernetes_node</text>
  <text x="200" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">KUBERNETES_NODE</text>

  <!-- Connect cluster to node -->
  <line x1="300" y1="140" x2="200" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="220" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">runs on</text>

  <!-- CLOUD_APPLICATION_NAMESPACE -->
  <rect x="400" y="150" width="250" height="50" rx="8" fill="url(#nsEntityGrad)" filter="url(#shadow)"/>
  <text x="525" y="172" font-family="monospace" font-size="9" fill="#99f6e4" text-anchor="middle">dt.entity.cloud_application_namespace</text>
  <text x="525" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">CLOUD_APPLICATION_NAMESPACE</text>

  <!-- Connect cluster to namespace -->
  <line x1="400" y1="140" x2="525" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="490" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">contains</text>

  <!-- Line from node to PGI -->
  <line x1="200" y1="200" x2="200" y2="250" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="212" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">runs on</text>

  <!-- CLOUD_APPLICATION -->
  <rect x="400" y="245" width="220" height="50" rx="8" fill="url(#workloadEntityGrad)" filter="url(#shadow)"/>
  <text x="510" y="267" font-family="monospace" font-size="10" fill="#fef3c7" text-anchor="middle">dt.entity.cloud_application</text>
  <text x="510" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">CLOUD_APPLICATION</text>

  <!-- Connect namespace to workload -->
  <line x1="525" y1="200" x2="510" y2="245" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="540" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">belongs to</text>

  <!-- PROCESS_GROUP_INSTANCE -->
  <rect x="70" y="260" width="260" height="50" rx="8" fill="url(#pgiEntityGrad)" filter="url(#shadow)"/>
  <text x="200" y="282" font-family="monospace" font-size="9" fill="#fbcfe8" text-anchor="middle">dt.entity.process_group_instance</text>
  <text x="200" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">PROCESS_GROUP_INSTANCE</text>

  <!-- Connect workload to PGI -->
  <line x1="400" y1="280" x2="330" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="355" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">instance of</text>

  <!-- Line from PGI to Service -->
  <line x1="200" y1="310" x2="200" y2="355" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="212" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94a3b8">provided by</text>

  <!-- SERVICE -->
  <rect x="100" y="365" width="200" height="50" rx="8" fill="url(#serviceEntityGrad)" filter="url(#shadow)"/>
  <text x="200" y="387" font-family="monospace" font-size="10" fill="#ddd6fe" text-anchor="middle">dt.entity.service</text>
  <text x="200" y="403" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">SERVICE</text>

  <!-- Legend -->
  <rect x="520" y="340" width="160" height="70" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="600" y="357" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#94a3b8" text-anchor="middle">Relationship Types</text>
  <line x1="530" y1="370" x2="555" y2="370" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="565" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#cbd5e1">Parent → Child</text>
  <text x="530" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">Labels show relationship</text>
</svg>