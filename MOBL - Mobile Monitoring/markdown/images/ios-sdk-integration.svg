<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="iPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1496ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a64bc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iLightBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    <filter id="iShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="iArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="400" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">iOS SDK Integration</text>
  <text x="400" y="46" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Embedding Dynatrace monitoring in iOS applications</text>

  <!-- Column 1: Swift App -->
  <rect x="30" y="65" width="160" height="250" rx="10" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#iShadow)"/>
  <rect x="30" y="65" width="160" height="32" rx="10" fill="url(#iPurpleGrad)"/>
  <rect x="30" y="89" width="160" height="8" fill="url(#iPurpleGrad)"/>
  <text x="110" y="87" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Swift App</text>

  <!-- Swift App sub-items -->
  <rect x="50" y="110" width="120" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">UIKit</text>

  <rect x="50" y="160" width="120" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">SwiftUI</text>

  <rect x="50" y="210" width="120" height="40" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="110" y="235" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">App Lifecycle</text>

  <rect x="50" y="260" width="120" height="40" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="110" y="285" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed" text-anchor="middle">Network Calls</text>

  <!-- Column 2: Dynatrace iOS SDK (large center) -->
  <rect x="245" y="65" width="310" height="250" rx="10" fill="#fff" stroke="#1496ff" stroke-width="2" filter="url(#iShadow)"/>
  <rect x="245" y="65" width="310" height="32" rx="10" fill="url(#iBlueGrad)"/>
  <rect x="245" y="89" width="310" height="8" fill="url(#iBlueGrad)"/>
  <text x="400" y="87" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Dynatrace iOS SDK</text>

  <!-- SDK feature boxes (2x2 grid) -->
  <rect x="265" y="110" width="130" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="330" y="132" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Auto-</text>
  <text x="330" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Instrumentation</text>

  <rect x="405" y="110" width="130" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="470" y="132" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Crash</text>
  <text x="470" y="148" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Reporting</text>

  <rect x="265" y="170" width="130" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="330" y="192" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Network</text>
  <text x="330" y="208" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Monitoring</text>

  <rect x="405" y="170" width="130" height="50" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="470" y="192" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Session</text>
  <text x="470" y="208" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af" text-anchor="middle">Replay</text>

  <!-- SDK additional info -->
  <rect x="265" y="232" width="270" height="35" rx="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">CocoaPods / Swift Package Manager / Manual</text>
  <text x="400" y="262" font-family="Arial, sans-serif" font-size="10" fill="#1e40af" text-anchor="middle">Integration options</text>

  <!-- Column 3: Dynatrace Platform -->
  <rect x="610" y="65" width="160" height="250" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2" filter="url(#iShadow)"/>
  <rect x="610" y="65" width="160" height="32" rx="10" fill="url(#iGreenGrad)"/>
  <rect x="610" y="89" width="160" height="8" fill="url(#iGreenGrad)"/>
  <text x="690" y="87" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Dynatrace Platform</text>

  <!-- Platform sub-items -->
  <rect x="630" y="110" width="120" height="40" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="690" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Grail</text>

  <rect x="630" y="160" width="120" height="40" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="690" y="185" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Dashboards</text>

  <rect x="630" y="210" width="120" height="40" rx="6" fill="#dcfce7" stroke="#4ade80" stroke-width="1"/>
  <text x="690" y="235" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#166534" text-anchor="middle">Alerting</text>

  <rect x="630" y="260" width="120" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="690" y="285" font-family="Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">Session Replay</text>

  <!-- Arrows: Left to Center -->
  <path d="M190,180 L240,180" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#iArrow)"/>
  <text x="215" y="170" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SDK</text>
  <text x="215" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">embedded</text>

  <!-- Arrows: Center to Right -->
  <path d="M555,180 L605,180" stroke="#64748b" stroke-width="2.5" fill="none" marker-end="url(#iArrow)"/>
  <text x="580" y="170" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Beacons</text>
  <text x="580" y="195" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">sent</text>

  <!-- Legend bar -->
  <rect x="40" y="335" width="720" height="50" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">The Dynatrace iOS SDK auto-instruments UIKit and provides APIs for SwiftUI.</text>
  <circle cx="100" cy="373" r="6" fill="#6366f1"/>
  <text x="113" y="377" font-family="Arial, sans-serif" font-size="10" fill="#333">App code</text>
  <circle cx="210" cy="373" r="6" fill="#1496ff"/>
  <text x="223" y="377" font-family="Arial, sans-serif" font-size="10" fill="#333">SDK capabilities</text>
  <circle cx="348" cy="373" r="6" fill="#22c55e"/>
  <text x="361" y="377" font-family="Arial, sans-serif" font-size="10" fill="#333">Platform services</text>
  <circle cx="488" cy="373" r="6" fill="#64748b"/>
  <text x="501" y="377" font-family="Arial, sans-serif" font-size="10" fill="#333">Data flow</text>
</svg>
