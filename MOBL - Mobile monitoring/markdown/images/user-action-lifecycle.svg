<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1496ff"/>
      <stop offset="100%" stop-color="#0a64bc"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="12" ry="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">User Action Lifecycle</text>

  <!-- Step 1: Action Start -->
  <rect x="20" y="60" width="128" height="70" rx="8" ry="8" fill="url(#purpleGrad)" filter="url(#shadow)"/>
  <text x="84" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Action Start</text>
  <text x="84" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e0e7ff">User taps button</text>

  <!-- Arrow 1-2 -->
  <line x1="148" y1="95" x2="170" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 2: Child Events -->
  <rect x="172" y="60" width="128" height="70" rx="8" ry="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="236" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Child Events</text>
  <text x="236" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">Network requests, errors</text>

  <!-- Arrow 2-3 -->
  <line x1="300" y1="95" x2="322" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 3: Action Complete -->
  <rect x="324" y="60" width="128" height="70" rx="8" ry="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="388" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Action</text>
  <text x="388" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Complete</text>
  <text x="388" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dbeafe">Timeout or explicit close</text>

  <!-- Arrow 3-4 -->
  <line x1="452" y1="95" x2="474" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: Beacon Created -->
  <rect x="476" y="60" width="128" height="70" rx="8" ry="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="540" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Beacon</text>
  <text x="540" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Created</text>
  <text x="540" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fff7ed">Action data packaged</text>

  <!-- Arrow 4-5 -->
  <line x1="604" y1="95" x2="626" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Sent to DT -->
  <rect x="628" y="60" width="148" height="70" rx="8" ry="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="702" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Sent to DT</text>
  <text x="702" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#dcfce7">Beacon transmitted</text>

  <!-- Duration timing bar -->
  <rect x="20" y="160" width="756" height="6" rx="3" ry="3" fill="#cbd5e1"/>
  <!-- Active portion -->
  <rect x="20" y="160" width="430" height="6" rx="3" ry="3" fill="#6366f1" opacity="0.7"/>
  <!-- Markers -->
  <line x1="20" y1="155" x2="20" y2="172" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="450" y1="155" x2="450" y2="172" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="776" y1="155" x2="776" y2="172" stroke="#22c55e" stroke-width="1.5"/>
  <text x="235" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6366f1">Action Duration</text>
  <text x="613" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Beacon Packaging + Transmit</text>
  <!-- Total label -->
  <text x="400" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#334155" font-style="italic">Total end-to-end time</text>

  <!-- Legend bar -->
  <rect x="0" y="245" width="800" height="55" rx="0" ry="0" fill="#e2e8f0"/>
  <rect x="0" y="288" width="800" height="12" rx="0" ry="12" fill="#e2e8f0"/>
  <text x="400" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Each user action captures timing, child events, and context before being sent as a beacon.</text>
</svg>