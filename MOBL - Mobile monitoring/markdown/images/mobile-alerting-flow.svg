<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1496ff"/>
      <stop offset="100%" stop-color="#0a64bc"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <marker id="arrowWhite" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" rx="12" ry="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e293b">Mobile Alerting Flow</text>

  <!-- Step numbers -->
  <circle cx="75" cy="58" r="12" fill="#94a3b8"/>
  <text x="75" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">1</text>

  <circle cx="265" cy="58" r="12" fill="#94a3b8"/>
  <text x="265" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">2</text>

  <circle cx="460" cy="58" r="12" fill="#94a3b8"/>
  <text x="460" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">3</text>

  <circle cx="668" cy="58" r="12" fill="#94a3b8"/>
  <text x="668" y="63" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">4</text>

  <!-- Step 1: Metric Threshold (red) -->
  <g filter="url(#shadow)">
    <rect x="20" y="78" width="160" height="100" rx="10" fill="url(#redGrad)"/>
    <text x="100" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Metric</text>
    <text x="100" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Threshold</text>
    <rect x="40" y="140" width="120" height="24" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="100" y="157" text-anchor="middle" font-size="11" fill="#fecaca">Crash rate > 2%</text>
  </g>

  <!-- Arrow 1->2 -->
  <line x1="180" y1="128" x2="205" y2="128" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowWhite)"/>

  <!-- Step 2: Davis Detects (purple) -->
  <g filter="url(#shadow)">
    <rect x="215" y="78" width="160" height="100" rx="10" fill="url(#purpleGrad)"/>
    <text x="295" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Davis</text>
    <text x="295" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Detects</text>
    <rect x="235" y="140" width="120" height="24" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="295" y="157" text-anchor="middle" font-size="11" fill="#e0e7ff">Anomaly identified</text>
  </g>

  <!-- Arrow 2->3 -->
  <line x1="375" y1="128" x2="400" y2="128" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowWhite)"/>

  <!-- Step 3: Workflow Triggered (blue) -->
  <g filter="url(#shadow)">
    <rect x="410" y="78" width="160" height="100" rx="10" fill="url(#blueGrad)"/>
    <text x="490" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Workflow</text>
    <text x="490" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Triggered</text>
    <rect x="430" y="140" width="120" height="24" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="490" y="157" text-anchor="middle" font-size="11" fill="#dbeafe">Automation runs</text>
  </g>

  <!-- Arrow 3->4 -->
  <line x1="570" y1="128" x2="595" y2="128" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowWhite)"/>

  <!-- Step 4: Notification Sent (green) -->
  <g filter="url(#shadow)">
    <rect x="605" y="78" width="175" height="130" rx="10" fill="url(#greenGrad)"/>
    <text x="692" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Notification</text>
    <text x="692" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Sent</text>
    <!-- Channel labels -->
    <rect x="620" y="140" width="70" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="655" y="155" text-anchor="middle" font-size="11" fill="#dcfce7">Slack</text>
    <rect x="698" y="140" width="70" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="733" y="155" text-anchor="middle" font-size="11" fill="#dcfce7">Email</text>
    <rect x="652" y="170" width="86" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="695" y="185" text-anchor="middle" font-size="11" fill="#dcfce7">PagerDuty</text>
  </g>

  <!-- Flow description labels under arrows -->
  <text x="192" y="220" text-anchor="middle" font-size="10" fill="#64748b">threshold</text>
  <text x="192" y="232" text-anchor="middle" font-size="10" fill="#64748b">breached</text>
  <text x="388" y="220" text-anchor="middle" font-size="10" fill="#64748b">problem</text>
  <text x="388" y="232" text-anchor="middle" font-size="10" fill="#64748b">opened</text>
  <text x="582" y="220" text-anchor="middle" font-size="10" fill="#64748b">action</text>
  <text x="582" y="232" text-anchor="middle" font-size="10" fill="#64748b">executed</text>

  <!-- Legend bar -->
  <rect x="40" y="258" width="720" height="30" rx="6" fill="#e2e8f0"/>
  <text x="400" y="278" text-anchor="middle" font-size="11" fill="#475569">Metric events trigger Davis problems, which can activate workflows for automated notification.</text>
</svg>