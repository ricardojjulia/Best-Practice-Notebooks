<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="classicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudNativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="appOnlyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">OneAgent Kubernetes Deployment Modes</text>
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Choose the right mode for your Kubernetes environment</text>

  <!-- Classic FullStack -->
  <g transform="translate(20, 70)">
    <rect width="180" height="180" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#cardShadow)"/>
    <rect width="180" height="35" rx="10" fill="url(#classicGrad)"/>
    <rect y="27" width="180" height="8" fill="url(#classicGrad)"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Classic FullStack</text>

    <!-- Node representation -->
    <rect x="15" y="50" width="150" height="60" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
    <text x="90" y="68" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle">K8s Node</text>
    <rect x="25" y="75" width="130" height="25" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="9" fill="#1e40af" text-anchor="middle">OneAgent DaemonSet</text>

    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">✓ Code-Level</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">✓ Host Metrics</text>
    <text x="90" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Best for: Traditional K8s</text>
  </g>

  <!-- Cloud Native FullStack -->
  <g transform="translate(215, 70)">
    <rect width="180" height="180" rx="10" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#cardShadow)"/>
    <rect width="180" height="35" rx="10" fill="url(#cloudNativeGrad)"/>
    <rect y="27" width="180" height="8" fill="url(#cloudNativeGrad)"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Cloud Native FullStack</text>

    <!-- Pod with init container -->
    <rect x="15" y="50" width="150" height="60" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
    <text x="90" y="68" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Pod</text>
    <rect x="25" y="75" width="60" height="25" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
    <text x="55" y="92" font-family="Arial, sans-serif" font-size="8" fill="#047857" text-anchor="middle">Init Container</text>
    <rect x="95" y="75" width="50" height="25" rx="4" fill="#fff" stroke="#64748b" stroke-width="1"/>
    <text x="120" y="92" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">App</text>

    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">✓ Code-Level</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">✓ Host Metrics</text>
    <text x="90" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Best for: Modern K8s</text>
  </g>

  <!-- Application Only -->
  <g transform="translate(410, 70)">
    <rect width="180" height="180" rx="10" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#cardShadow)"/>
    <rect width="180" height="35" rx="10" fill="url(#appOnlyGrad)"/>
    <rect y="27" width="180" height="8" fill="url(#appOnlyGrad)"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Application Only</text>

    <!-- Pod with sidecar -->
    <rect x="15" y="50" width="150" height="60" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
    <text x="90" y="68" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Pod</text>
    <rect x="25" y="75" width="60" height="25" rx="4" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1"/>
    <text x="55" y="92" font-family="Arial, sans-serif" font-size="8" fill="#5b21b6" text-anchor="middle">Sidecar</text>
    <rect x="95" y="75" width="50" height="25" rx="4" fill="#fff" stroke="#64748b" stroke-width="1"/>
    <text x="120" y="92" font-family="Arial, sans-serif" font-size="8" fill="#475569" text-anchor="middle">App</text>

    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">✓ Code-Level</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">✗ Host Metrics</text>
    <text x="90" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Best for: PaaS, Shared</text>
  </g>

  <!-- Infrastructure Only -->
  <g transform="translate(605, 70)">
    <rect width="180" height="180" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#cardShadow)"/>
    <rect width="180" height="35" rx="10" fill="url(#infraGrad)"/>
    <rect y="27" width="180" height="8" fill="url(#infraGrad)"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Infrastructure Only</text>

    <!-- Node representation -->
    <rect x="15" y="50" width="150" height="60" rx="6" fill="#e2e8f0" stroke="#64748b" stroke-width="1"/>
    <text x="90" y="68" font-family="Arial, sans-serif" font-size="10" fill="#475569" text-anchor="middle">K8s Node</text>
    <rect x="25" y="75" width="130" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="90" y="92" font-family="Arial, sans-serif" font-size="9" fill="#92400e" text-anchor="middle">OneAgent (Infra)</text>

    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#999" text-anchor="middle">✗ Code-Level</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">✓ Host Metrics</text>
    <text x="90" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Best for: Metrics only</text>
  </g>

  <!-- Decision Flow -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Decision Guide</text>

  <!-- Decision boxes -->
  <g transform="translate(50, 300)">
    <rect width="700" height="180" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#cardShadow)"/>

    <!-- Question 1 -->
    <rect x="20" y="15" width="200" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="120" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Need code-level</text>
    <text x="120" y="50" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">visibility?</text>

    <!-- Yes branch -->
    <line x1="220" y1="40" x2="260" y2="40" stroke="#10b981" stroke-width="2"/>
    <text x="240" y="35" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Yes</text>

    <!-- Question 2 -->
    <rect x="260" y="15" width="200" height="50" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="360" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">Have host access</text>
    <text x="360" y="50" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">(not PaaS)?</text>

    <!-- Yes to Cloud Native -->
    <line x1="460" y1="40" x2="500" y2="40" stroke="#10b981" stroke-width="2"/>
    <text x="480" y="35" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Yes</text>
    <rect x="500" y="20" width="180" height="40" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="590" y="45" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#047857" text-anchor="middle">Cloud Native FullStack</text>

    <!-- No to App Only -->
    <line x1="360" y1="65" x2="360" y2="90" stroke="#ef4444" stroke-width="2"/>
    <text x="375" y="80" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">No</text>
    <rect x="260" y="90" width="200" height="40" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
    <text x="360" y="115" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5b21b6" text-anchor="middle">Application Only</text>

    <!-- No branch from Q1 -->
    <line x1="120" y1="65" x2="120" y2="110" stroke="#ef4444" stroke-width="2"/>
    <text x="135" y="90" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">No</text>
    <rect x="20" y="110" width="200" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="120" y="135" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e" text-anchor="middle">Infrastructure Only</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 485)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#64748b">DaemonSet = Runs on every node | Init Container = Injected at pod start | Sidecar = Container alongside app</text>
  </g>
</svg>
