<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 520">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="questionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="bucketSolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="segmentSolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="securitySolGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad2)"/>

  <!-- Title -->
  <text x="375" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="20" font-weight="600">Organization Decision Framework</text>

  <!-- Start -->
  <rect x="280" y="55" width="190" height="40" rx="20" fill="url(#questionGrad)" filter="url(#shadow2)"/>
  <text x="375" y="80" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">What problem are you solving?</text>

  <!-- Vertical connector -->
  <line x1="375" y1="95" x2="375" y2="115" stroke="#475569" stroke-width="2"/>

  <!-- Question 1 -->
  <rect x="50" y="115" width="200" height="50" rx="6" fill="#312e81" filter="url(#shadow2)"/>
  <text x="150" y="138" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="11">Need different retention?</text>
  <text x="150" y="155" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">YES →</text>

  <line x1="250" y1="140" x2="280" y2="140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="280" y="120" width="140" height="40" rx="6" fill="url(#bucketSolGrad)" filter="url(#shadow2)"/>
  <text x="350" y="145" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Create BUCKET</text>

  <!-- Question 2 -->
  <rect x="50" y="180" width="200" height="50" rx="6" fill="#312e81" filter="url(#shadow2)"/>
  <text x="150" y="203" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="11">Need cost attribution?</text>
  <text x="150" y="220" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">YES →</text>

  <line x1="250" y1="205" x2="280" y2="205" stroke="#f59e0b" stroke-width="2"/>
  <rect x="280" y="185" width="180" height="40" rx="6" fill="url(#bucketSolGrad)" filter="url(#shadow2)"/>
  <text x="370" y="210" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">BUCKET per team/LOB</text>

  <!-- Question 3 -->
  <rect x="50" y="245" width="200" height="50" rx="6" fill="#312e81" filter="url(#shadow2)"/>
  <text x="150" y="268" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="11">Need team isolation (simple)?</text>
  <text x="150" y="285" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">YES →</text>

  <line x1="250" y1="270" x2="280" y2="270" stroke="#f59e0b" stroke-width="2"/>
  <rect x="280" y="250" width="180" height="40" rx="6" fill="url(#bucketSolGrad)" filter="url(#shadow2)"/>
  <text x="370" y="275" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">BUCKET-level IAM</text>

  <!-- Question 4 -->
  <rect x="50" y="310" width="200" height="50" rx="6" fill="#312e81" filter="url(#shadow2)"/>
  <text x="150" y="333" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="11">Need dynamic data views?</text>
  <text x="150" y="350" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">YES →</text>

  <line x1="250" y1="335" x2="280" y2="335" stroke="#ec4899" stroke-width="2"/>
  <rect x="280" y="315" width="140" height="40" rx="6" fill="url(#segmentSolGrad)" filter="url(#shadow2)"/>
  <text x="350" y="340" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Create SEGMENT</text>

  <!-- Question 5 -->
  <rect x="50" y="375" width="200" height="50" rx="6" fill="#312e81" filter="url(#shadow2)"/>
  <text x="150" y="398" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="11">Need fine-grained access?</text>
  <text x="150" y="415" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">YES →</text>

  <line x1="250" y1="400" x2="280" y2="400" stroke="#10b981" stroke-width="2"/>
  <rect x="280" y="380" width="180" height="40" rx="6" fill="url(#securitySolGrad)" filter="url(#shadow2)"/>
  <text x="370" y="405" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">SECURITY CONTEXT</text>

  <!-- Question 6 -->
  <rect x="50" y="440" width="200" height="50" rx="6" fill="#312e81" filter="url(#shadow2)"/>
  <text x="150" y="463" text-anchor="middle" fill="#c7d2fe" font-family="system-ui, sans-serif" font-size="11">Need combined approach?</text>
  <text x="150" y="480" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10" font-weight="600">YES →</text>

  <line x1="250" y1="465" x2="280" y2="465" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="280" y="445" width="200" height="40" rx="6" fill="#7c3aed" filter="url(#shadow2)"/>
  <text x="380" y="470" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Use MULTIPLE mechanisms</text>

  <!-- Legend -->
  <rect x="500" y="115" width="220" height="150" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="520" y="140" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12" font-weight="600">SOLUTIONS:</text>

  <rect x="520" y="155" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="540" y="165" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="11">Buckets (physical)</text>

  <rect x="520" y="180" width="12" height="12" rx="2" fill="#ec4899"/>
  <text x="540" y="190" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="11">Segments (logical)</text>

  <rect x="520" y="205" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="540" y="215" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="11">Security Context (access)</text>

  <rect x="520" y="230" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="540" y="240" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="11">Combined (enterprise)</text>
</svg>
