<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="teamAGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="teamBGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="policyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bucketGrad5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow5" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad5)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Team Isolation with Bucket-Level Access</text>

  <!-- Platform Team Column -->
  <text x="175" y="60" text-anchor="middle" fill="#60a5fa" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Platform Team</text>

  <rect x="75" y="75" width="200" height="50" rx="8" fill="url(#teamAGrad)" filter="url(#shadow5)"/>
  <text x="175" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12">
    <tspan x="175" dy="0">Users</tspan>
  </text>
  <text x="175" y="115" text-anchor="middle" fill="#bfdbfe" font-family="system-ui, sans-serif" font-size="10">(Platform Engineers)</text>

  <line x1="175" y1="125" x2="175" y2="155" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="175,165 168,155 182,155" fill="#3b82f6"/>

  <rect x="75" y="170" width="200" height="70" rx="8" fill="url(#policyGrad)" filter="url(#shadow5)"/>
  <text x="175" y="195" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">IAM Policy</text>
  <text x="175" y="215" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="9">bucket-name STARTSWITH</text>
  <text x="175" y="230" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">'team_platform_'</text>

  <line x1="175" y1="240" x2="175" y2="270" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="175,280 168,270 182,270" fill="#f59e0b"/>

  <rect x="75" y="285" width="200" height="60" rx="8" fill="url(#bucketGrad5)" filter="url(#shadow5)"/>
  <text x="175" y="315" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">team_platform_logs</text>
  <text x="175" y="335" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="10">(Infrastructure logs)</text>

  <!-- Checkout Team Column -->
  <text x="525" y="60" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Checkout Team</text>

  <rect x="425" y="75" width="200" height="50" rx="8" fill="url(#teamBGrad)" filter="url(#shadow5)"/>
  <text x="525" y="100" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12">
    <tspan x="525" dy="0">Users</tspan>
  </text>
  <text x="525" y="115" text-anchor="middle" fill="#a7f3d0" font-family="system-ui, sans-serif" font-size="10">(Checkout Developers)</text>

  <line x1="525" y1="125" x2="525" y2="155" stroke="#10b981" stroke-width="2"/>
  <polygon points="525,165 518,155 532,155" fill="#10b981"/>

  <rect x="425" y="170" width="200" height="70" rx="8" fill="url(#policyGrad)" filter="url(#shadow5)"/>
  <text x="525" y="195" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">IAM Policy</text>
  <text x="525" y="215" text-anchor="middle" fill="#e9d5ff" font-family="monospace" font-size="9">bucket-name STARTSWITH</text>
  <text x="525" y="230" text-anchor="middle" fill="#c4b5fd" font-family="monospace" font-size="9">'team_checkout_'</text>

  <line x1="525" y1="240" x2="525" y2="270" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="525,280 518,270 532,270" fill="#f59e0b"/>

  <rect x="425" y="285" width="200" height="60" rx="8" fill="url(#bucketGrad5)" filter="url(#shadow5)"/>
  <text x="525" y="315" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">team_checkout_logs</text>
  <text x="525" y="335" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="10">(Application logs)</text>

  <!-- Divider -->
  <line x1="350" y1="55" x2="350" y2="350" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- X marks showing isolation -->
  <text x="350" y="320" text-anchor="middle" fill="#ef4444" font-family="system-ui, sans-serif" font-size="24" font-weight="bold">✕</text>
  <text x="350" y="345" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="10">No cross-access</text>
</svg>
