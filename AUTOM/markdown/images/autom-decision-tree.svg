<svg xmlns="http://www.w3.org/2000/svg" width="700" height="450" viewBox="0 0 700 450">
  <!-- Background -->
  <rect width="700" height="450" fill="#1e293b"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Automation Tool Decision Framework</text>

  <!-- Start node -->
  <rect x="280" y="50" width="140" height="40" rx="20" fill="#14b8a6"/>
  <text x="350" y="75" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Start</text>

  <!-- Decision 1: One-time task? -->
  <polygon points="350,110 420,155 350,200 280,155" fill="#3b82f6"/>
  <text x="350" y="152" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">One-time</text>
  <text x="350" y="164" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">task?</text>

  <!-- Arrow from Start to Decision 1 -->
  <line x1="350" y1="90" x2="350" y2="110" stroke="#64748b" stroke-width="2"/>
  <polygon points="350,110 346,102 354,102" fill="#64748b"/>

  <!-- Yes branch from Decision 1 to Settings API -->
  <rect x="480" y="135" width="120" height="40" rx="4" fill="#6366f1"/>
  <text x="540" y="160" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Settings API</text>
  <line x1="420" y1="155" x2="480" y2="155" stroke="#64748b" stroke-width="2"/>
  <polygon points="480,155 472,151 472,159" fill="#64748b"/>
  <text x="450" y="145" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">Yes</text>

  <!-- Decision 2: Need state management? -->
  <polygon points="350,220 420,265 350,310 280,265" fill="#3b82f6"/>
  <text x="350" y="260" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Need state</text>
  <text x="350" y="272" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">mgmt?</text>

  <!-- No branch from Decision 1 to Decision 2 -->
  <line x1="350" y1="200" x2="350" y2="220" stroke="#64748b" stroke-width="2"/>
  <polygon points="350,220 346,212 354,212" fill="#64748b"/>
  <text x="360" y="212" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">No</text>

  <!-- Yes branch from Decision 2 to Terraform -->
  <rect x="480" y="245" width="120" height="40" rx="4" fill="#8b5cf6"/>
  <text x="540" y="270" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Terraform</text>
  <line x1="420" y1="265" x2="480" y2="265" stroke="#64748b" stroke-width="2"/>
  <polygon points="480,265 472,261 472,269" fill="#64748b"/>
  <text x="450" y="255" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">Yes</text>

  <!-- Decision 3: Event-driven? -->
  <polygon points="350,330 420,375 350,420 280,375" fill="#3b82f6"/>
  <text x="350" y="370" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Event-</text>
  <text x="350" y="382" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">driven?</text>

  <!-- No branch from Decision 2 to Decision 3 -->
  <line x1="350" y1="310" x2="350" y2="330" stroke="#64748b" stroke-width="2"/>
  <polygon points="350,330 346,322 354,322" fill="#64748b"/>
  <text x="360" y="322" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">No</text>

  <!-- Yes branch from Decision 3 to Workflows -->
  <rect x="480" y="355" width="120" height="40" rx="4" fill="#a78bfa"/>
  <text x="540" y="380" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Workflows</text>
  <line x1="420" y1="375" x2="480" y2="375" stroke="#64748b" stroke-width="2"/>
  <polygon points="480,375 472,371 472,379" fill="#64748b"/>
  <text x="450" y="365" fill="#22c55e" font-family="Arial, sans-serif" font-size="10">Yes</text>

  <!-- No branch from Decision 3 to Monaco -->
  <rect x="100" y="355" width="120" height="40" rx="4" fill="#14b8a6"/>
  <text x="160" y="380" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Monaco</text>
  <line x1="280" y1="375" x2="220" y2="375" stroke="#64748b" stroke-width="2"/>
  <polygon points="220,375 228,371 228,379" fill="#64748b"/>
  <text x="250" y="365" fill="#ef4444" font-family="Arial, sans-serif" font-size="10">No</text>

  <!-- Building custom app? branch to SDK -->
  <rect x="100" y="245" width="120" height="40" rx="4" fill="#f59e0b"/>
  <text x="160" y="270" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">SDK</text>
  <line x1="280" y1="265" x2="220" y2="265" stroke="#64748b" stroke-width="2"/>
  <polygon points="220,265 228,261 228,269" fill="#64748b"/>
  <text x="230" y="255" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">Custom App</text>

  <!-- Legend -->
  <rect x="30" y="60" width="140" height="80" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="100" y="78" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Legend</text>
  <polygon points="50,95 70,105 50,115 30,105" fill="#3b82f6" transform="scale(0.5) translate(60,100)"/>
  <text x="70" y="108" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Decision</text>
  <rect x="40" y="118" width="20" height="12" rx="2" fill="#6366f1"/>
  <text x="70" y="128" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Tool Choice</text>
</svg>
