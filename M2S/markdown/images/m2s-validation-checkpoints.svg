<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="300" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Validation Checkpoints</text>

  <!-- Timeline -->
  <g transform="translate(50, 60)">
    <!-- Timeline line -->
    <rect x="0" y="35" width="600" height="6" rx="3" fill="#334155"/>

    <!-- Immediate (0-24h) -->
    <g transform="translate(0, 0)">
      <rect width="180" height="70" rx="8" fill="#22c55e" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Immediate</text>
      <text x="90" y="38" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="10">(0-24 hours)</text>
      <text x="90" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Data flowing, entities discovered</text>

      <!-- Checkpoints -->
      <circle cx="90" cy="90" r="15" fill="#22c55e" stroke="white" stroke-width="2"/>
      <text x="90" y="95" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">1</text>
    </g>

    <!-- Short-term (1-7d) -->
    <g transform="translate(210, 0)">
      <rect width="180" height="70" rx="8" fill="#3b82f6" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Short-term</text>
      <text x="90" y="38" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="10">(1-7 days)</text>
      <text x="90" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Baselines established, alerts working</text>

      <circle cx="90" cy="90" r="15" fill="#3b82f6" stroke="white" stroke-width="2"/>
      <text x="90" y="95" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">2</text>
    </g>

    <!-- Medium-term (1-4w) -->
    <g transform="translate(420, 0)">
      <rect width="180" height="70" rx="8" fill="#a855f7" filter="url(#shadow)"/>
      <text x="90" y="22" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Medium-term</text>
      <text x="90" y="38" text-anchor="middle" fill="#d8b4fe" font-family="Arial, sans-serif" font-size="10">(1-4 weeks)</text>
      <text x="90" y="58" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10">Performance validated, optimized</text>

      <circle cx="90" cy="90" r="15" fill="#a855f7" stroke="white" stroke-width="2"/>
      <text x="90" y="95" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">3</text>
    </g>
  </g>

  <!-- Validation Items -->
  <g transform="translate(50, 170)">
    <rect width="600" height="110" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- Column 1: Entities -->
    <g transform="translate(20, 20)">
      <text x="0" y="0" fill="#22c55e" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Checkpoint 1</text>
      <circle cx="8" cy="18" r="3" fill="#64748b"/>
      <text x="18" y="22" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">All hosts reporting</text>
      <circle cx="8" cy="38" r="3" fill="#64748b"/>
      <text x="18" y="42" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Services discovered</text>
      <circle cx="8" cy="58" r="3" fill="#64748b"/>
      <text x="18" y="62" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Metrics flowing</text>
      <circle cx="8" cy="78" r="3" fill="#64748b"/>
      <text x="18" y="82" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Logs ingesting</text>
    </g>

    <!-- Column 2: Alerting -->
    <g transform="translate(220, 20)">
      <text x="0" y="0" fill="#3b82f6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Checkpoint 2</text>
      <circle cx="8" cy="18" r="3" fill="#64748b"/>
      <text x="18" y="22" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Davis baselines</text>
      <circle cx="8" cy="38" r="3" fill="#64748b"/>
      <text x="18" y="42" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Alerts triggering</text>
      <circle cx="8" cy="58" r="3" fill="#64748b"/>
      <text x="18" y="62" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Notifications working</text>
      <circle cx="8" cy="78" r="3" fill="#64748b"/>
      <text x="18" y="82" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Dashboards accurate</text>
    </g>

    <!-- Column 3: Optimization -->
    <g transform="translate(420, 20)">
      <text x="0" y="0" fill="#a855f7" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Checkpoint 3</text>
      <circle cx="8" cy="18" r="3" fill="#64748b"/>
      <text x="18" y="22" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Alert tuning complete</text>
      <circle cx="8" cy="38" r="3" fill="#64748b"/>
      <text x="18" y="42" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Query performance OK</text>
      <circle cx="8" cy="58" r="3" fill="#64748b"/>
      <text x="18" y="62" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Feature adoption started</text>
      <circle cx="8" cy="78" r="3" fill="#64748b"/>
      <text x="18" y="82" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Stakeholder sign-off</text>
    </g>
  </g>
</svg>
