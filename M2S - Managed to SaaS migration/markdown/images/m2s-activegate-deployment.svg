<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" viewBox="0 0 700 320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="envAgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="synthAgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="320" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="bold">ActiveGate Types for SaaS</text>

  <!-- Environment ActiveGate -->
  <g transform="translate(30, 55)">
    <rect width="310" height="240" rx="8" fill="#1e293b" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect width="310" height="45" rx="8" fill="url(#envAgGrad)"/>
    <rect y="37" width="310" height="8" fill="url(#envAgGrad)"/>
    <text x="155" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Environment ActiveGate</text>

    <!-- Icon placeholder -->
    <g transform="translate(20, 60)">
      <rect width="60" height="60" rx="8" fill="#0d9488"/>
      <text x="30" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24">AG</text>
    </g>

    <!-- Purpose -->
    <g transform="translate(95, 65)">
      <text x="0" y="0" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Purpose:</text>
      <text x="0" y="18" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">OneAgent routing</text>
      <text x="0" y="34" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Extensions 2.0 execution</text>
      <text x="0" y="50" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Cloud platform integrations</text>
    </g>

    <!-- When Needed -->
    <g transform="translate(20, 140)">
      <text x="0" y="0" fill="#4ade80" font-family="Arial, sans-serif" font-size="11" font-weight="bold">When Needed:</text>
      <circle cx="10" cy="18" r="3" fill="#14b8a6"/>
      <text x="20" y="22" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Hosts can't reach SaaS directly</text>
      <circle cx="10" cy="38" r="3" fill="#14b8a6"/>
      <text x="20" y="42" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Running Extensions 2.0</text>
      <circle cx="10" cy="58" r="3" fill="#14b8a6"/>
      <text x="20" y="62" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">VMware/Cloud monitoring</text>
      <circle cx="10" cy="78" r="3" fill="#14b8a6"/>
      <text x="20" y="82" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Log ingest via API</text>
    </g>
  </g>

  <!-- Synthetic ActiveGate -->
  <g transform="translate(360, 55)">
    <rect width="310" height="240" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>

    <!-- Header -->
    <rect width="310" height="45" rx="8" fill="url(#synthAgGrad)"/>
    <rect y="37" width="310" height="8" fill="url(#synthAgGrad)"/>
    <text x="155" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Synthetic ActiveGate</text>

    <!-- Icon placeholder -->
    <g transform="translate(20, 60)">
      <rect width="60" height="60" rx="8" fill="#7c3aed"/>
      <text x="30" y="35" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24">SY</text>
    </g>

    <!-- Purpose -->
    <g transform="translate(95, 65)">
      <text x="0" y="0" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Purpose:</text>
      <text x="0" y="18" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Private synthetic locations</text>
      <text x="0" y="34" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Internal app monitoring</text>
      <text x="0" y="50" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Browser/HTTP monitors</text>
    </g>

    <!-- When Needed -->
    <g transform="translate(20, 140)">
      <text x="0" y="0" fill="#4ade80" font-family="Arial, sans-serif" font-size="11" font-weight="bold">When Needed:</text>
      <circle cx="10" cy="18" r="3" fill="#8b5cf6"/>
      <text x="20" y="22" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Internal app testing</text>
      <circle cx="10" cy="38" r="3" fill="#8b5cf6"/>
      <text x="20" y="42" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">VPN-only endpoints</text>
      <circle cx="10" cy="58" r="3" fill="#8b5cf6"/>
      <text x="20" y="62" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Pre-production monitoring</text>
      <circle cx="10" cy="78" r="3" fill="#8b5cf6"/>
      <text x="20" y="82" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Regional test locations</text>
    </g>
  </g>
</svg>
