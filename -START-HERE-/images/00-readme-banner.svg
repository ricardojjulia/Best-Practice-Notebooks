<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>

  <!-- Title and subtitle, matching project convention (y=38 / y=62) -->
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Start Here — Find Your Path</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Three doorways into the Dynatrace Best Practice Topics — pick the one that matches your situation</text>

  <defs>
    <marker id="shArrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Doorway 1 — Net New (green) -->
  <rect x="40" y="100" width="270" height="190" fill="#73BE28" opacity="0.08" stroke="#73BE28" stroke-width="1.5" rx="8"/>
  <text x="175" y="128" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="700" letter-spacing="1.5">DOORWAY 1</text>
  <text x="175" y="155" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Net New</text>
  <text x="175" y="178" text-anchor="middle" fill="#94A3B8" font-size="12">Greenfield or migrating from</text>
  <text x="175" y="194" text-anchor="middle" fill="#94A3B8" font-size="12">another tool — net-new tenant</text>
  <text x="175" y="222" text-anchor="middle" fill="#CBD5E1" font-size="11">No prior observability platform</text>
  <text x="175" y="240" text-anchor="middle" fill="#CBD5E1" font-size="11">From New Relic / Splunk / Sumo</text>
  <text x="175" y="258" text-anchor="middle" fill="#CBD5E1" font-size="11">Multi-tool hybrid migration</text>
  <text x="175" y="280" text-anchor="middle" fill="#86EFAC" font-size="11" font-weight="600">2–9 months</text>

  <!-- Doorway 2 — Expanding / Consolidating (blue) -->
  <rect x="330" y="100" width="270" height="190" fill="#1496FF" opacity="0.08" stroke="#1496FF" stroke-width="1.5" rx="8"/>
  <text x="465" y="128" text-anchor="middle" fill="#BFDBFE" font-size="11" font-weight="700" letter-spacing="1.5">DOORWAY 2</text>
  <text x="465" y="155" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Expanding / Consolidating</text>
  <text x="465" y="178" text-anchor="middle" fill="#94A3B8" font-size="12">Existing tenant — adding scope or</text>
  <text x="465" y="194" text-anchor="middle" fill="#94A3B8" font-size="12">consolidating from another tool</text>
  <text x="465" y="222" text-anchor="middle" fill="#CBD5E1" font-size="11">Add a new domain (K8S, RUM, …)</text>
  <text x="465" y="240" text-anchor="middle" fill="#CBD5E1" font-size="11">Consolidate logs or APM</text>
  <text x="465" y="258" text-anchor="middle" fill="#CBD5E1" font-size="11">Mature operations &amp; AI</text>
  <text x="465" y="280" text-anchor="middle" fill="#BFDBFE" font-size="11" font-weight="600">1 week – 6 months</text>

  <!-- Doorway 3 — Deployment Migration (purple) -->
  <rect x="620" y="100" width="270" height="190" fill="#A78BFA" opacity="0.08" stroke="#A78BFA" stroke-width="1.5" rx="8"/>
  <text x="755" y="128" text-anchor="middle" fill="#DDD6FE" font-size="11" font-weight="700" letter-spacing="1.5">DOORWAY 3</text>
  <text x="755" y="155" text-anchor="middle" fill="#F8FAFC" font-size="18" font-weight="700">Deployment Migration</text>
  <text x="755" y="178" text-anchor="middle" fill="#94A3B8" font-size="12">Existing customer changing</text>
  <text x="755" y="194" text-anchor="middle" fill="#94A3B8" font-size="12">their deployment model</text>
  <text x="755" y="222" text-anchor="middle" fill="#CBD5E1" font-size="11">Managed → SaaS</text>
  <text x="755" y="240" text-anchor="middle" fill="#CBD5E1" font-size="11">SaaS → SaaS consolidation</text>
  <text x="755" y="258" text-anchor="middle" fill="#CBD5E1" font-size="11">Region change</text>
  <text x="755" y="280" text-anchor="middle" fill="#DDD6FE" font-size="11" font-weight="600">3–9 months</text>

  <!-- Convergence arrows from each doorway down to the modules row -->
  <line x1="175" y1="290" x2="270" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#shArrow)"/>
  <line x1="465" y1="290" x2="465" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#shArrow)"/>
  <line x1="755" y1="290" x2="660" y2="345" stroke="#64748B" stroke-width="1.5" marker-end="url(#shArrow)"/>

  <!-- "All paths converge" hint -->
  <text x="465" y="335" text-anchor="middle" fill="#64748B" font-size="11" font-style="italic">all paths converge through the same modules</text>

  <!-- Modules row: Foundation → Domains → Operationalize → Maturity -->
  <rect x="60"  y="350" width="180" height="50" fill="#FFB800" opacity="0.08" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <text x="150" y="375" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">Foundation</text>
  <text x="150" y="391" text-anchor="middle" fill="#94A3B8" font-size="10">ONBRD + ORGNZ + IAM</text>

  <line x1="240" y1="375" x2="262" y2="375" stroke="#64748B" stroke-width="1.5" marker-end="url(#shArrow)"/>

  <rect x="262" y="350" width="155" height="50" fill="#1496FF" opacity="0.08" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <text x="339" y="375" text-anchor="middle" fill="#BFDBFE" font-size="13" font-weight="700">Domains</text>
  <text x="339" y="391" text-anchor="middle" fill="#94A3B8" font-size="10">K8S · CLOUD · SPANS · …</text>

  <line x1="417" y1="375" x2="439" y2="375" stroke="#64748B" stroke-width="1.5" marker-end="url(#shArrow)"/>

  <rect x="439" y="350" width="170" height="50" fill="#73BE28" opacity="0.08" stroke="#73BE28" stroke-width="1.5" rx="6"/>
  <text x="524" y="375" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">Operationalize</text>
  <text x="524" y="391" text-anchor="middle" fill="#94A3B8" font-size="10">DASH · WFLOW · AUTOM · AIOPS</text>

  <line x1="609" y1="375" x2="631" y2="375" stroke="#64748B" stroke-width="1.5" marker-end="url(#shArrow)"/>

  <rect x="631" y="350" width="160" height="50" fill="#A78BFA" opacity="0.08" stroke="#A78BFA" stroke-width="1.5" rx="6"/>
  <text x="711" y="375" text-anchor="middle" fill="#DDD6FE" font-size="13" font-weight="700">Maturity</text>
  <text x="711" y="391" text-anchor="middle" fill="#94A3B8" font-size="10">ADOPT — continuous loop</text>

  <!-- Loop-back arrow from Maturity to keep iterating -->
  <path d="M 791 375 Q 870 375 870 415 Q 870 432 845 432" fill="none" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#shArrow)"/>
  <text x="845" y="408" text-anchor="middle" fill="#64748B" font-size="9" font-style="italic">iterate</text>

  <!-- Alternative path — skip the playbook and browse the topics list directly -->
  <text x="465" y="425" text-anchor="middle" fill="#64748B" font-size="11" font-style="italic">— or —</text>
  <rect x="245" y="438" width="440" height="34" fill="#1E293B" stroke="#94A3B8" stroke-width="1.2" stroke-dasharray="5 3" rx="17"/>
  <text x="465" y="460" text-anchor="middle" fill="#F8FAFC" font-size="12" font-weight="600">Already know what you need? Browse all 28 topic series</text>
  <!-- Down chevron after the text, indicating topics live below the banner -->
  <path d="M 660 454 L 668 462 L 676 454" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Footer line -->
  <text x="465" y="491" text-anchor="middle" fill="#64748B" font-size="10">3 doorways  ·  4 reusable modules  ·  1 / 3 / 5-day workshop agendas</text>
</svg>
