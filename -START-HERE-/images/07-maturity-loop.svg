<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Maturity is a Loop</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Run every 6–12 months — assess, measure, enable, plan, execute, repeat</text>
  <defs>
    <marker id="arrowMat" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>
  <circle cx="465" cy="280" r="50" fill="#A78BFA" opacity="0.08" stroke="#A78BFA" stroke-width="2"/>
  <text x="465" y="278" text-anchor="middle" fill="#DDD6FE" font-size="15" font-weight="700">ADOPT</text>
  <text x="465" y="295" text-anchor="middle" fill="#94A3B8" font-size="10">Continuous</text>
  <rect x="380" y="100" width="170" height="65" fill="#1496FF" opacity="0.08" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <text x="465" y="125" text-anchor="middle" fill="#BFDBFE" font-size="13" font-weight="700">Assess</text>
  <text x="465" y="143" text-anchor="middle" fill="#94A3B8" font-size="10">Platform health</text>
  <text x="465" y="158" text-anchor="middle" fill="#94A3B8" font-size="10">ADOPT-02</text>
  <rect x="650" y="220" width="170" height="65" fill="#73BE28" opacity="0.08" stroke="#73BE28" stroke-width="1.5" rx="6"/>
  <text x="735" y="245" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">Measure</text>
  <text x="735" y="263" text-anchor="middle" fill="#94A3B8" font-size="10">Success metrics</text>
  <text x="735" y="278" text-anchor="middle" fill="#94A3B8" font-size="10">ADOPT-03</text>
  <rect x="600" y="370" width="170" height="65" fill="#FFB800" opacity="0.08" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <text x="685" y="395" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">Enable</text>
  <text x="685" y="413" text-anchor="middle" fill="#94A3B8" font-size="10">Team enablement</text>
  <text x="685" y="428" text-anchor="middle" fill="#94A3B8" font-size="10">ADOPT-04</text>
  <rect x="160" y="370" width="170" height="65" fill="#22D3EE" opacity="0.08" stroke="#22D3EE" stroke-width="1.5" rx="6"/>
  <text x="245" y="395" text-anchor="middle" fill="#A5F3FC" font-size="13" font-weight="700">Plan</text>
  <text x="245" y="413" text-anchor="middle" fill="#94A3B8" font-size="10">Optimization roadmap</text>
  <text x="245" y="428" text-anchor="middle" fill="#94A3B8" font-size="10">ADOPT-05</text>
  <rect x="110" y="220" width="170" height="65" fill="#DE350B" opacity="0.08" stroke="#DE350B" stroke-width="1.5" rx="6"/>
  <text x="195" y="245" text-anchor="middle" fill="#FCA5A5" font-size="13" font-weight="700">Execute</text>
  <text x="195" y="263" text-anchor="middle" fill="#94A3B8" font-size="10">Roadmap delivery</text>
  <text x="195" y="278" text-anchor="middle" fill="#94A3B8" font-size="10">All series</text>
  <path d="M 550 132 Q 700 170 695 220" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowMat)"/>
  <path d="M 735 285 Q 760 360 685 370" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowMat)"/>
  <path d="M 600 410 Q 480 460 330 405" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowMat)"/>
  <path d="M 245 370 Q 180 360 195 285" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowMat)"/>
  <path d="M 195 220 Q 220 165 380 132" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrowMat)"/>
  <text x="465" y="478" text-anchor="middle" fill="#64748B" font-size="11">Loop frequency: annual baseline; quarterly is too frequent (no settling time); biennial lets debt accumulate</text>
</svg>
