<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 500" font-family="Inter, system-ui, sans-serif">
  <rect width="930" height="500" fill="#0F172A"/>
  <text x="465" y="38" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">Three Doorways into the Playbook</text>
  <text x="465" y="62" text-anchor="middle" fill="#94A3B8" font-size="13">Pick your entry point; all paths converge through the same modules</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect x="40" y="100" width="260" height="100" fill="#73BE28" opacity="0.08" stroke="#73BE28" stroke-width="1.5" rx="8"/>
  <text x="170" y="130" text-anchor="middle" fill="#86EFAC" font-size="15" font-weight="700">Doorway 1</text>
  <text x="170" y="155" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">Net New</text>
  <text x="170" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">Greenfield or migrating from</text>
  <text x="170" y="195" text-anchor="middle" fill="#94A3B8" font-size="11">another tool — net-new tenant</text>
  <rect x="335" y="100" width="260" height="100" fill="#1496FF" opacity="0.08" stroke="#1496FF" stroke-width="1.5" rx="8"/>
  <text x="465" y="130" text-anchor="middle" fill="#BFDBFE" font-size="15" font-weight="700">Doorway 2</text>
  <text x="465" y="155" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">Expanding / Consolidating</text>
  <text x="465" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">Existing tenant; adding scope or</text>
  <text x="465" y="195" text-anchor="middle" fill="#94A3B8" font-size="11">consolidating from another tool</text>
  <rect x="630" y="100" width="260" height="100" fill="#A78BFA" opacity="0.08" stroke="#A78BFA" stroke-width="1.5" rx="8"/>
  <text x="760" y="130" text-anchor="middle" fill="#DDD6FE" font-size="15" font-weight="700">Doorway 3</text>
  <text x="760" y="155" text-anchor="middle" fill="#F8FAFC" font-size="14" font-weight="700">Deployment Migration</text>
  <text x="760" y="180" text-anchor="middle" fill="#94A3B8" font-size="11">Existing customer changing</text>
  <text x="760" y="195" text-anchor="middle" fill="#94A3B8" font-size="11">deployment (M2S, S2S)</text>
  <line x1="170" y1="200" x2="350" y2="245" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="465" y1="200" x2="465" y2="245" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="200" x2="580" y2="245" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="250" width="230" height="50" fill="#1E293B" stroke="#FFB800" stroke-width="1.5" rx="6"/>
  <text x="465" y="278" text-anchor="middle" fill="#FCD34D" font-size="13" font-weight="700">Foundation</text>
  <text x="465" y="293" text-anchor="middle" fill="#94A3B8" font-size="10">ONBRD + ORGNZ + IAM</text>
  <line x1="465" y1="300" x2="465" y2="335" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="340" width="230" height="40" fill="#1E293B" stroke="#1496FF" stroke-width="1.5" rx="6"/>
  <text x="465" y="365" text-anchor="middle" fill="#BFDBFE" font-size="13" font-weight="700">Domain Enablement</text>
  <line x1="465" y1="380" x2="465" y2="405" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="350" y="410" width="230" height="40" fill="#1E293B" stroke="#73BE28" stroke-width="1.5" rx="6"/>
  <text x="465" y="435" text-anchor="middle" fill="#86EFAC" font-size="13" font-weight="700">Operationalize</text>
  <line x1="580" y1="430" x2="640" y2="430" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="640" y="410" width="170" height="40" fill="#1E293B" stroke="#A78BFA" stroke-width="1.5" rx="6"/>
  <text x="725" y="435" text-anchor="middle" fill="#DDD6FE" font-size="13" font-weight="700">Maturity (loops)</text>
  <text x="465" y="478" text-anchor="middle" fill="#64748B" font-size="11">Continuous improvement loops back through Doorway 2 or Foundation as needs emerge</text>
</svg>
