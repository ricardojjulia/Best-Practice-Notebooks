  <rect x="260" y="205" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="350" y="223" text-anchor="middle" fill="#F8FAFC" font-size="11">4. Prepare</text>
  <rect x="60" y="240" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="150" y="258" text-anchor="middle" fill="#F8FAFC" font-size="11">5. Execute</text>
  <rect x="260" y="240" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="350" y="258" text-anchor="middle" fill="#F8FAFC" font-size="11">6. Integrate</text>
  <rect x="60" y="275" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="150" y="293" text-anchor="middle" fill="#F8FAFC" font-size="11">7. Expand</text>
  <rect x="260" y="275" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="350" y="293" text-anchor="middle" fill="#F8FAFC" font-size="11">8. Enable</text>
  <rect x="60" y="310" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="150" y="328" text-anchor="middle" fill="#F8FAFC" font-size="11">9. Optimize</text>
  <rect x="260" y="310" width="180" height="28" fill="#1E293B" stroke="#A78BFA" rx="4"/>
  <text x="350" y="328" text-anchor="middle" fill="#94A3B8" font-size="11">99. Best Practice</text>
  <text x="250" y="365" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="700">Foundation refresh in steps 3 + 7</text>
  <text x="250" y="385" text-anchor="middle" fill="#94A3B8" font-size="10">IAM, ORGNZ buckets, security_context, OpenPipeline</text>
  <text x="250" y="420" text-anchor="middle" fill="#94A3B8" font-size="11">Total: 4–8 months</text>
  <rect x="470" y="100" width="420" height="350" fill="#22D3EE" opacity="0.08" stroke="#22D3EE" stroke-width="1.5" rx="8"/>
