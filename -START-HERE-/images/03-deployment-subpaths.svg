  <rect x="690" y="205" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="780" y="223" text-anchor="middle" fill="#F8FAFC" font-size="11">4. Prepare</text>
  <rect x="490" y="240" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="580" y="258" text-anchor="middle" fill="#F8FAFC" font-size="11">5. Execute</text>
  <rect x="690" y="240" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="780" y="258" text-anchor="middle" fill="#F8FAFC" font-size="11">6. Integrate</text>
  <rect x="490" y="275" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="580" y="293" text-anchor="middle" fill="#F8FAFC" font-size="11">7. Expand</text>
  <rect x="690" y="275" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="780" y="293" text-anchor="middle" fill="#F8FAFC" font-size="11">8. Enable</text>
  <rect x="490" y="310" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="580" y="328" text-anchor="middle" fill="#F8FAFC" font-size="11">9. Optimize</text>
  <rect x="690" y="310" width="180" height="28" fill="#1E293B" stroke="#22D3EE" rx="4"/>
  <text x="780" y="328" text-anchor="middle" fill="#94A3B8" font-size="11">10. Scripts / 99</text>
  <text x="680" y="365" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="700">Foundation refresh in steps 3 + 7</text>
  <text x="680" y="385" text-anchor="middle" fill="#94A3B8" font-size="10">Same Gen3 topics as M2S</text>
