<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <!-- Background -->
  <rect width="700" height="400" fill="#1e293b"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="bold">GitOps Workflow for Dynatrace</text>

  <!-- Developer Section -->
  <rect x="30" y="60" width="120" height="120" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="85" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Developer</text>

  <!-- Developer actions -->
  <rect x="40" y="100" width="100" height="25" rx="4" fill="#3b82f6" fill-opacity="0.6"/>
  <text x="90" y="117" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Create Branch</text>

  <rect x="40" y="130" width="100" height="25" rx="4" fill="#3b82f6" fill-opacity="0.6"/>
  <text x="90" y="147" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Edit YAML</text>

  <!-- Arrow to Git -->
  <line x1="150" y1="120" x2="190" y2="120" stroke="#64748b" stroke-width="2"/>
  <polygon points="190,120 182,116 182,124" fill="#64748b"/>
  <text x="170" y="110" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Push</text>

  <!-- Git Repository -->
  <rect x="190" y="60" width="120" height="120" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="2"/>
  <text x="250" y="85" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Git Repo</text>

  <rect x="200" y="100" width="100" height="25" rx="4" fill="#f97316" fill-opacity="0.6"/>
  <text x="250" y="117" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Pull Request</text>

  <rect x="200" y="130" width="100" height="25" rx="4" fill="#f97316" fill-opacity="0.6"/>
  <text x="250" y="147" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Code Review</text>

  <!-- Arrow to CI/CD -->
  <line x1="310" y1="120" x2="350" y2="120" stroke="#64748b" stroke-width="2"/>
  <polygon points="350,120 342,116 342,124" fill="#64748b"/>
  <text x="330" y="110" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Trigger</text>

  <!-- CI/CD Pipeline -->
  <rect x="350" y="60" width="140" height="120" rx="6" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"/>
  <text x="420" y="85" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">CI/CD Pipeline</text>

  <rect x="360" y="100" width="120" height="25" rx="4" fill="#8b5cf6" fill-opacity="0.6"/>
  <text x="420" y="117" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Validate Config</text>

  <rect x="360" y="130" width="120" height="25" rx="4" fill="#8b5cf6" fill-opacity="0.6"/>
  <text x="420" y="147" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Monaco Deploy</text>

  <!-- Arrow to Dynatrace -->
  <line x1="490" y1="120" x2="530" y2="120" stroke="#64748b" stroke-width="2"/>
  <polygon points="530,120 522,116 522,124" fill="#64748b"/>
  <text x="510" y="110" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Deploy</text>

  <!-- Dynatrace -->
  <rect x="530" y="60" width="140" height="120" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="2"/>
  <text x="600" y="85" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Dynatrace</text>

  <rect x="540" y="100" width="120" height="25" rx="4" fill="#14b8a6" fill-opacity="0.6"/>
  <text x="600" y="117" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Settings Applied</text>

  <rect x="540" y="130" width="120" height="25" rx="4" fill="#14b8a6" fill-opacity="0.6"/>
  <text x="600" y="147" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Monitoring Active</text>

  <!-- Environment progression -->
  <rect x="30" y="220" width="640" height="150" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="350" y="245" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Environment Promotion</text>

  <!-- Dev -->
  <rect x="60" y="270" width="150" height="70" rx="4" fill="#3b82f6" fill-opacity="0.4" stroke="#3b82f6" stroke-width="1"/>
  <text x="135" y="295" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Development</text>
  <text x="135" y="315" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">feature/* branch</text>
  <text x="135" y="330" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Auto deploy</text>

  <!-- Arrow -->
  <line x1="210" y1="305" x2="260" y2="305" stroke="#64748b" stroke-width="2"/>
  <polygon points="260,305 252,301 252,309" fill="#64748b"/>

  <!-- Staging -->
  <rect x="260" y="270" width="150" height="70" rx="4" fill="#8b5cf6" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="295" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Staging</text>
  <text x="335" y="315" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">develop branch</text>
  <text x="335" y="330" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Auto deploy</text>

  <!-- Arrow -->
  <line x1="410" y1="305" x2="460" y2="305" stroke="#64748b" stroke-width="2"/>
  <polygon points="460,305 452,301 452,309" fill="#64748b"/>

  <!-- Production -->
  <rect x="460" y="270" width="180" height="70" rx="4" fill="#22c55e" fill-opacity="0.4" stroke="#22c55e" stroke-width="1"/>
  <text x="550" y="295" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Production</text>
  <text x="550" y="315" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">main branch</text>
  <text x="550" y="330" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Manual approval</text>
</svg>
