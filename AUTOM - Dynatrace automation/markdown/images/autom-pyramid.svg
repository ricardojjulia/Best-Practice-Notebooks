<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <!-- Background -->
  <rect width="700" height="400" fill="#1e293b"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Dynatrace Automation Pyramid</text>
  <text x="350" y="50" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">From low-level APIs to high-level abstractions</text>

  <!-- Pyramid layers (bottom to top) -->

  <!-- Layer 1: Settings API (bottom, widest) -->
  <polygon points="100,350 600,350 520,290 180,290" fill="#6366f1" fill-opacity="0.8"/>
  <text x="350" y="328" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Settings API</text>
  <text x="350" y="345" text-anchor="middle" fill="#e0e7ff" font-family="Arial, sans-serif" font-size="11">Direct REST API Access</text>

  <!-- Layer 2: SDKs -->
  <polygon points="180,290 520,290 460,230 240,230" fill="#8b5cf6" fill-opacity="0.8"/>
  <text x="350" y="268" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Dynatrace SDKs</text>
  <text x="350" y="285" text-anchor="middle" fill="#e0e7ff" font-family="Arial, sans-serif" font-size="11">TypeScript / Python Clients</text>

  <!-- Layer 3: Workflows -->
  <polygon points="240,230 460,230 410,170 290,170" fill="#a78bfa" fill-opacity="0.8"/>
  <text x="350" y="208" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Workflows</text>
  <text x="350" y="225" text-anchor="middle" fill="#e0e7ff" font-family="Arial, sans-serif" font-size="11">Event-Driven Automation</text>

  <!-- Layer 4: Monaco/Terraform (top) -->
  <polygon points="290,170 410,170 370,110 330,110" fill="#c4b5fd" fill-opacity="0.9"/>
  <text x="350" y="145" text-anchor="middle" fill="#1e293b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Monaco</text>
  <text x="350" y="160" text-anchor="middle" fill="#374151" font-family="Arial, sans-serif" font-size="10">Terraform</text>

  <!-- Labels on side -->
  <text x="620" y="320" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Low Level</text>
  <text x="620" y="140" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">High Level</text>

  <!-- Arrow -->
  <line x1="640" y1="300" x2="640" y2="160" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="640,155 635,165 645,165" fill="#94a3b8"/>

  <!-- Legend -->
  <rect x="50" y="70" width="130" height="90" rx="4" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="115" y="90" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Abstraction Level</text>
  <rect x="60" y="100" width="12" height="12" fill="#c4b5fd"/>
  <text x="78" y="110" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">High (IaC)</text>
  <rect x="60" y="118" width="12" height="12" fill="#a78bfa"/>
  <text x="78" y="128" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Medium</text>
  <rect x="60" y="136" width="12" height="12" fill="#6366f1"/>
  <text x="78" y="146" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Low (API)</text>
</svg>
