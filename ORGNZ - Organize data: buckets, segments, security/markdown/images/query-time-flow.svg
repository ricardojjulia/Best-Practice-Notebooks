<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad4)"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">How Permissions Work at Query Time</text>

  <!-- Left column: Steps 1-3 -->

  <!-- Step 1: User Query -->
  <rect x="30" y="55" width="295" height="42" rx="8" fill="url(#stepGrad)" filter="url(#shadow4)"/>
  <text x="55" y="80" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">1</text>
  <text x="75" y="80" fill="white" font-family="system-ui, sans-serif" font-size="13">User submits DQL query</text>

  <!-- Arrow 1->2 -->
  <line x1="177" y1="97" x2="177" y2="117" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 2: IAM Evaluation -->
  <rect x="30" y="122" width="295" height="42" rx="8" fill="url(#processGrad)" filter="url(#shadow4)"/>
  <text x="55" y="147" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">2</text>
  <text x="75" y="147" fill="white" font-family="system-ui, sans-serif" font-size="13">Grail evaluates user's IAM policies</text>

  <!-- Arrow 2->3 -->
  <line x1="177" y1="164" x2="177" y2="184" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 3: Bucket Scope -->
  <rect x="30" y="189" width="295" height="42" rx="8" fill="url(#processGrad)" filter="url(#shadow4)"/>
  <text x="55" y="214" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">3</text>
  <text x="75" y="214" fill="white" font-family="system-ui, sans-serif" font-size="13">Query scopes to allowed buckets</text>

  <!-- Connector: Step 3 -> Step 4 (across columns) -->
  <line x1="325" y1="210" x2="375" y2="210" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- Connecting path: right from step 3, then down-right curve to step 4 -->
  <path d="M325,210 L345,210 Q355,210 355,220 L355,270 Q355,280 365,280 L375,280" stroke="#3b82f6" stroke-width="2" fill="none"/>
  <!-- Arrow tip at step 4 -->
  <polygon points="375,275 375,285 385,280" fill="#3b82f6"/>

  <!-- Right column: Steps 4-6 -->

  <!-- Step 4: Record Filter -->
  <rect x="385" y="55" width="285" height="42" rx="8" fill="url(#processGrad)" filter="url(#shadow4)"/>
  <text x="410" y="80" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">4</text>
  <text x="430" y="80" fill="white" font-family="system-ui, sans-serif" font-size="13">Record-level filters applied</text>

  <!-- Side note: Unauthorized -->
  <rect x="555" y="102" width="110" height="52" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="1"/>
  <text x="610" y="120" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="10">Unauthorized</text>
  <text x="610" y="133" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="10">records are</text>
  <text x="610" y="146" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="10" font-weight="bold">filtered out</text>
  <line x1="600" y1="97" x2="600" y2="102" stroke="#dc2626" stroke-width="1" stroke-dasharray="4"/>

  <!-- Arrow 4->5 -->
  <line x1="527" y1="97" x2="527" y2="164" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 5: Field Masks -->
  <rect x="385" y="169" width="285" height="42" rx="8" fill="url(#processGrad)" filter="url(#shadow4)"/>
  <text x="410" y="194" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">5</text>
  <text x="430" y="194" fill="white" font-family="system-ui, sans-serif" font-size="13">Field-level masks applied (if any)</text>

  <!-- Arrow 5->6 -->
  <line x1="527" y1="211" x2="527" y2="268" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Results -->
  <rect x="410" y="273" width="235" height="40" rx="8" fill="url(#resultGrad)" filter="url(#shadow4)"/>
  <text x="435" y="297" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="12" font-weight="bold">6</text>
  <text x="455" y="297" fill="white" font-family="system-ui, sans-serif" font-size="13">Results returned to user</text>

  <!-- Flow label on left column -->
  <text x="15" y="145" fill="#475569" font-family="system-ui, sans-serif" font-size="10" writing-mode="tb" text-anchor="middle">EVALUATE</text>

  <!-- Flow label on right column -->
  <text x="375" y="145" fill="#475569" font-family="system-ui, sans-serif" font-size="10" writing-mode="tb" text-anchor="middle">FILTER</text>
</svg>
