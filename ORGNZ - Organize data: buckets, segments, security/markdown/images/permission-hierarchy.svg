<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="bucketLevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="tableLevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="recordLevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="fieldLevelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad3)"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Permission Hierarchy</text>

  <!-- Bucket Level -->
  <rect x="125" y="60" width="250" height="55" rx="8" fill="url(#bucketLevelGrad)" filter="url(#shadow3)"/>
  <text x="250" y="85" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Bucket Level</text>
  <text x="250" y="103" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="11">(broadest scope)</text>

  <!-- Arrow -->
  <line x1="250" y1="115" x2="250" y2="140" stroke="#475569" stroke-width="3" marker-end="url(#arrowDown)"/>

  <!-- Table Level -->
  <rect x="125" y="145" width="250" height="55" rx="8" fill="url(#tableLevelGrad)" filter="url(#shadow3)"/>
  <text x="250" y="170" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Table Level</text>
  <text x="250" y="188" text-anchor="middle" fill="#ccfbf1" font-family="system-ui, sans-serif" font-size="11">(logs, metrics, spans...)</text>

  <!-- Arrow -->
  <line x1="250" y1="200" x2="250" y2="225" stroke="#475569" stroke-width="3" marker-end="url(#arrowDown)"/>

  <!-- Record Level -->
  <rect x="125" y="230" width="250" height="55" rx="8" fill="url(#recordLevelGrad)" filter="url(#shadow3)"/>
  <text x="250" y="255" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Record Level</text>
  <text x="250" y="273" text-anchor="middle" fill="#e9d5ff" font-family="system-ui, sans-serif" font-size="11">(by attributes, security context)</text>

  <!-- Arrow -->
  <line x1="250" y1="285" x2="250" y2="310" stroke="#475569" stroke-width="3" marker-end="url(#arrowDown)"/>

  <!-- Field Level -->
  <rect x="125" y="315" width="250" height="55" rx="8" fill="url(#fieldLevelGrad)" filter="url(#shadow3)"/>
  <text x="250" y="340" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Field Level</text>
  <text x="250" y="358" text-anchor="middle" fill="#fce7f3" font-family="system-ui, sans-serif" font-size="11">(most granular)</text>

  <!-- Granularity indicator -->
  <text x="410" y="95" fill="#64748b" font-family="system-ui, sans-serif" font-size="24">↑</text>
  <text x="395" y="120" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Broader</text>

  <text x="410" y="335" fill="#64748b" font-family="system-ui, sans-serif" font-size="24">↓</text>
  <text x="388" y="360" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">More Granular</text>
</svg>
