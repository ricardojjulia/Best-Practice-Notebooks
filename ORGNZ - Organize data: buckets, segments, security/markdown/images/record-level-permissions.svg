<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="queryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="evalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="filterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="resultGrad6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow6" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad6)"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Record-Level Permission Flow</text>

  <!-- User Query -->
  <rect x="175" y="50" width="250" height="50" rx="8" fill="url(#queryGrad)" filter="url(#shadow6)"/>
  <text x="300" y="72" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">User Query</text>
  <text x="300" y="90" text-anchor="middle" fill="#bfdbfe" font-family="monospace" font-size="10">fetch logs | limit 100</text>

  <line x1="300" y1="100" x2="300" y2="125" stroke="#475569" stroke-width="2"/>
  <polygon points="300,135 293,125 307,125" fill="#475569"/>

  <!-- IAM Evaluation -->
  <rect x="175" y="140" width="250" height="40" rx="8" fill="url(#evalGrad)" filter="url(#shadow6)"/>
  <text x="300" y="165" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">IAM Policy Evaluation</text>

  <line x1="300" y1="180" x2="300" y2="205" stroke="#475569" stroke-width="2"/>
  <polygon points="300,215 293,205 307,205" fill="#475569"/>

  <!-- Record Filter Box -->
  <rect x="100" y="220" width="400" height="100" rx="8" fill="url(#filterGrad)" filter="url(#shadow6)"/>
  <text x="300" y="245" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Record Filter Applied</text>

  <!-- Filter conditions -->
  <rect x="120" y="255" width="110" height="25" rx="4" fill="#78350f"/>
  <text x="175" y="272" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="10">✓ namespace</text>

  <rect x="245" y="255" width="110" height="25" rx="4" fill="#78350f"/>
  <text x="300" y="272" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="10">✓ host group</text>

  <rect x="370" y="255" width="115" height="25" rx="4" fill="#78350f"/>
  <text x="427" y="272" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="10">✓ security context</text>

  <text x="300" y="305" text-anchor="middle" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="10">Only matching records pass through</text>

  <line x1="300" y1="320" x2="300" y2="345" stroke="#475569" stroke-width="2"/>
  <polygon points="300,355 293,345 307,345" fill="#475569"/>

  <!-- Result -->
  <rect x="150" y="360" width="300" height="35" rx="8" fill="url(#resultGrad6)" filter="url(#shadow6)"/>
  <text x="300" y="383" text-anchor="middle" fill="white" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Only authorized records returned</text>
</svg>
