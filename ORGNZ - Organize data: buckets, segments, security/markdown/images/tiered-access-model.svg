<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <linearGradient id="bgGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="tier1Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#b91c1c"/>
    </linearGradient>
    <linearGradient id="tier2Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="tier3Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="tier4Grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7280"/>
      <stop offset="100%" style="stop-color:#4b5563"/>
    </linearGradient>
    <filter id="shadow7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad7)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="system-ui, sans-serif" font-size="18" font-weight="600">Tiered Access Model</text>

  <!-- Tier 1: Platform Admins -->
  <rect x="50" y="55" width="600" height="80" rx="8" fill="url(#tier1Grad)" filter="url(#shadow7)"/>
  <text x="80" y="85" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Tier 1: Platform Admins</text>
  <text x="80" y="105" fill="#fecaca" font-family="system-ui, sans-serif" font-size="11">• All buckets • All data types • All records</text>
  <rect x="450" y="70" width="180" height="25" rx="4" fill="#7f1d1d"/>
  <text x="540" y="88" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-size="10">ALLOW storage:*:read</text>
  <text x="540" y="125" text-anchor="middle" fill="#fef2f2" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Full access</text>

  <!-- Tier 2: Team Leads -->
  <rect x="100" y="145" width="500" height="80" rx="8" fill="url(#tier2Grad)" filter="url(#shadow7)"/>
  <text x="130" y="175" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Tier 2: Team Leads</text>
  <text x="130" y="195" fill="#fef3c7" font-family="system-ui, sans-serif" font-size="11">• Default + team buckets • All data types • Team context</text>
  <rect x="400" y="160" width="180" height="25" rx="4" fill="#78350f"/>
  <text x="490" y="178" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">context MATCH ('team-*')</text>
  <text x="490" y="215" text-anchor="middle" fill="#fffbeb" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Team data only</text>

  <!-- Tier 3: Developers -->
  <rect x="150" y="235" width="400" height="80" rx="8" fill="url(#tier3Grad)" filter="url(#shadow7)"/>
  <text x="180" y="265" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Tier 3: Developers</text>
  <text x="180" y="285" fill="#bfdbfe" font-family="system-ui, sans-serif" font-size="11">• Default buckets • Logs and spans • Own namespace</text>
  <rect x="350" y="250" width="180" height="25" rx="4" fill="#1e3a8a"/>
  <text x="440" y="268" text-anchor="middle" fill="#93c5fd" font-family="monospace" font-size="9">namespace = '${user.ns}'</text>
  <text x="440" y="305" text-anchor="middle" fill="#eff6ff" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Namespace scoped</text>

  <!-- Tier 4: Read-Only Viewers -->
  <rect x="200" y="325" width="300" height="80" rx="8" fill="url(#tier4Grad)" filter="url(#shadow7)"/>
  <text x="230" y="355" fill="white" font-family="system-ui, sans-serif" font-size="14" font-weight="bold">Tier 4: Read-Only Viewers</text>
  <text x="230" y="375" fill="#d1d5db" font-family="system-ui, sans-serif" font-size="11">• Default buckets • Logs only • Public context</text>
  <rect x="350" y="340" width="130" height="25" rx="4" fill="#374151"/>
  <text x="415" y="358" text-anchor="middle" fill="#9ca3af" font-family="monospace" font-size="9">context = 'public'</text>
  <text x="415" y="395" text-anchor="middle" fill="#f3f4f6" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Public only</text>

  <!-- Access indicator arrows -->
  <text x="30" y="95" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="20">◀</text>
  <text x="680" y="365" fill="#6b7280" font-family="system-ui, sans-serif" font-size="16">▶</text>
  <text x="30" y="415" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">More Access</text>
  <text x="620" y="415" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Less Access</text>
</svg>
