<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="collectorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="componentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1496ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070c9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- Title -->
  <text x="350" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#f1f5f9" text-anchor="middle">OpenTelemetry Architecture</text>

  <!-- Application 1 -->
  <rect x="60" y="55" width="150" height="80" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="135" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Application</text>
  <text x="135" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">+ OTel SDK</text>
  <text x="135" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Auto-instrumentation</text>

  <!-- Application 2 -->
  <rect x="275" y="55" width="150" height="80" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="350" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Application</text>
  <text x="350" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">+ OTel SDK</text>
  <text x="350" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Manual spans</text>

  <!-- Application 3 -->
  <rect x="490" y="55" width="150" height="80" rx="8" fill="url(#appGrad)" filter="url(#shadow)"/>
  <text x="565" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Application</text>
  <text x="565" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c7d2fe" text-anchor="middle">+ OTel SDK</text>
  <text x="565" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Metrics + Logs</text>

  <!-- OTLP arrows from apps to collector -->
  <line x1="135" y1="135" x2="135" y2="165" stroke="#94a3b8" stroke-width="2"/>
  <line x1="350" y1="135" x2="350" y2="165" stroke="#94a3b8" stroke-width="2"/>
  <line x1="565" y1="135" x2="565" y2="165" stroke="#94a3b8" stroke-width="2"/>
  <line x1="135" y1="165" x2="350" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <line x1="565" y1="165" x2="350" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <line x1="350" y1="165" x2="350" y2="195" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- OTLP label -->
  <text x="350" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">OTLP (gRPC/HTTP)</text>

  <!-- OpenTelemetry Collector -->
  <rect x="100" y="200" width="500" height="140" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">OpenTelemetry Collector</text>

  <!-- Receivers -->
  <rect x="125" y="245" width="100" height="70" rx="6" fill="url(#componentGrad)" filter="url(#shadow)"/>
  <text x="175" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Receivers</text>
  <text x="175" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" text-anchor="middle">OTLP, Jaeger</text>
  <text x="175" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" text-anchor="middle">Prometheus</text>

  <!-- Arrow R to P -->
  <line x1="225" y1="280" x2="268" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Processors -->
  <rect x="275" y="245" width="110" height="70" rx="6" fill="url(#componentGrad)" filter="url(#shadow)"/>
  <text x="330" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Processors</text>
  <text x="330" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" text-anchor="middle">Batch, Filter</text>
  <text x="330" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" text-anchor="middle">Attributes</text>

  <!-- Arrow P to E -->
  <line x1="385" y1="280" x2="433" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Exporters -->
  <rect x="440" y="245" width="100" height="70" rx="6" fill="url(#componentGrad)" filter="url(#shadow)"/>
  <text x="490" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#fff" text-anchor="middle">Exporters</text>
  <text x="490" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" text-anchor="middle">OTLP/HTTP</text>
  <text x="490" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" text-anchor="middle">Debug</text>

  <!-- Arrow from collector to Dynatrace -->
  <line x1="350" y1="340" x2="350" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>
  <text x="350" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">OTLP</text>

  <!-- Dynatrace -->
  <rect x="200" y="385" width="300" height="55" rx="10" fill="url(#dtGrad)" filter="url(#shadow)"/>
  <text x="350" y="412" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Dynatrace</text>
  <text x="350" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#bfdbfe" text-anchor="middle">Unified view, correlation, Davis AI</text>

  <!-- Signal types -->
  <rect x="545" y="385" width="130" height="55" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="610" y="402" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#94a3b8" text-anchor="middle">Signals</text>
  <text x="555" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#f59e0b">●</text>
  <text x="570" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#cbd5e1">Traces</text>
  <text x="555" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#22c55e">●</text>
  <text x="570" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#cbd5e1">Metrics</text>
  <text x="620" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#3b82f6">●</text>
  <text x="635" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#cbd5e1">Logs</text>
</svg>