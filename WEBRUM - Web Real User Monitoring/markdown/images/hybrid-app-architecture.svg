<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480">
  <defs>
    <linearGradient id="mobileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="desktopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="webGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1496ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a64bc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="28" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#333" text-anchor="middle">Hybrid App Monitoring Architecture</text>
  <text x="350" y="46" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Mobile WebView + Desktop Browser sharing the same web app</text>

  <!-- Left Column: Clients -->
  <!-- Mobile App Zone -->
  <rect x="20" y="65" width="200" height="190" rx="8" fill="#f5f3ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="120" y="84" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6366f1" text-anchor="middle">Mobile App (iOS / Android)</text>

  <!-- Native Shell -->
  <rect x="35" y="95" width="170" height="38" rx="6" fill="url(#mobileGrad)" filter="url(#shadow)"/>
  <text x="120" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Native Shell</text>
  <text x="120" y="126" font-family="Arial, sans-serif" font-size="9" fill="#e0e7ff" text-anchor="middle">Mobile OneAgent SDK</text>

  <!-- WebView -->
  <rect x="35" y="145" width="170" height="38" rx="6" fill="url(#webGrad)" filter="url(#shadow)"/>
  <text x="120" y="162" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">WebView</text>
  <text x="120" y="176" font-family="Arial, sans-serif" font-size="9" fill="#fff3e0" text-anchor="middle">RUM JS (hybrid mode)</text>

  <!-- Session correlation arrow -->
  <line x1="120" y1="133" x2="120" y2="145" stroke="#6366f1" stroke-width="1.5"/>
  <polygon points="115,143 125,143 120,148" fill="#6366f1"/>
  <text x="190" y="142" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" font-weight="bold">dtAdk cookie</text>

  <!-- Mobile App label -->
  <rect x="35" y="198" width="170" height="20" rx="4" fill="#ede9fe"/>
  <text x="120" y="212" font-family="Arial, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle" font-weight="bold">App: "MyApp Mobile"</text>

  <!-- Desktop Browser Zone -->
  <rect x="20" y="275" width="200" height="130" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="120" y="294" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6" text-anchor="middle">Desktop Browser</text>

  <!-- Browser with RUM JS -->
  <rect x="35" y="305" width="170" height="38" rx="6" fill="url(#desktopGrad)" filter="url(#shadow)"/>
  <text x="120" y="322" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Same Web App</text>
  <text x="120" y="336" font-family="Arial, sans-serif" font-size="9" fill="#dbeafe" text-anchor="middle">RUM JS (standard mode)</text>

  <!-- Desktop App label -->
  <rect x="35" y="358" width="170" height="20" rx="4" fill="#dbeafe"/>
  <text x="120" y="372" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6" text-anchor="middle" font-weight="bold">App: "MyApp Desktop"</text>

  <!-- Center Column: Shared Web Server -->
  <rect x="260" y="145" width="170" height="180" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="345" y="167" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f97316" text-anchor="middle">Web Server</text>

  <rect x="275" y="180" width="140" height="30" rx="5" fill="url(#webGrad)" filter="url(#shadow)"/>
  <text x="345" y="200" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" text-anchor="middle">app.example.com</text>

  <rect x="275" y="222" width="140" height="25" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="239" font-family="Arial, sans-serif" font-size="9" fill="#92400e" text-anchor="middle">OneAgent (auto-inject)</text>

  <rect x="275" y="258" width="140" height="25" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="345" y="275" font-family="Arial, sans-serif" font-size="9" fill="#92400e" text-anchor="middle">or Manual JS Tag</text>

  <!-- Detection Rules box -->
  <rect x="275" y="295" width="140" height="22" rx="4" fill="#fde68a"/>
  <text x="345" y="310" font-family="Arial, sans-serif" font-size="8" fill="#92400e" text-anchor="middle" font-weight="bold">Detection Rules split traffic</text>

  <!-- Right Column: Dynatrace -->
  <rect x="470" y="65" width="210" height="380" rx="8" fill="#eff6ff" stroke="#1496ff" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="575" y="84" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1496ff" text-anchor="middle">Dynatrace</text>

  <!-- Mobile RUM App -->
  <rect x="490" y="100" width="170" height="50" rx="6" fill="url(#mobileGrad)" filter="url(#shadow)"/>
  <text x="575" y="120" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Mobile RUM App</text>
  <text x="575" y="138" font-family="Arial, sans-serif" font-size="9" fill="#e0e7ff" text-anchor="middle">Native + WebView sessions</text>

  <!-- Desktop RUM App -->
  <rect x="490" y="170" width="170" height="50" rx="6" fill="url(#desktopGrad)" filter="url(#shadow)"/>
  <text x="575" y="190" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Desktop RUM App</text>
  <text x="575" y="208" font-family="Arial, sans-serif" font-size="9" fill="#dbeafe" text-anchor="middle">Browser-only sessions</text>

  <!-- Server-side Service -->
  <rect x="490" y="240" width="170" height="40" rx="6" fill="url(#dtGrad)" filter="url(#shadow)"/>
  <text x="575" y="265" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Server-Side Services</text>

  <!-- Grail -->
  <rect x="490" y="305" width="170" height="45" rx="6" fill="url(#grailGrad)" filter="url(#shadow)"/>
  <text x="575" y="323" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Grail</text>
  <text x="575" y="340" font-family="Arial, sans-serif" font-size="9" fill="#dcfce7" text-anchor="middle">Unified session + action data</text>

  <!-- DQL query box -->
  <rect x="490" y="365" width="170" height="30" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="575" y="384" font-family="Arial, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="bold">DQL: compare mobile vs desktop</text>

  <!-- Arrows: Mobile → Web Server -->
  <line x1="220" y1="160" x2="258" y2="200" stroke="#6366f1" stroke-width="2"/>
  <polygon points="254,196 260,202 252,202" fill="#6366f1"/>

  <!-- Desktop → Web Server -->
  <line x1="220" y1="325" x2="258" y2="270" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="254,274 260,268 252,268" fill="#3b82f6"/>

  <!-- Web Server → Mobile RUM (detection rule) -->
  <line x1="430" y1="195" x2="488" y2="130" stroke="#6366f1" stroke-width="2"/>
  <polygon points="484,134 490,128 486,138" fill="#6366f1"/>

  <!-- Web Server → Desktop RUM (detection rule) -->
  <line x1="430" y1="250" x2="488" y2="195" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="484,199 490,193 486,203" fill="#3b82f6"/>

  <!-- Services → Grail -->
  <line x1="575" y1="280" x2="575" y2="303" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="570,300 580,300 575,308" fill="#94a3b8"/>

  <!-- Legend -->
  <rect x="20" y="425" width="660" height="42" rx="6" fill="#f1f5f9"/>
  <rect x="35" y="436" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="52" y="447" font-family="Arial, sans-serif" font-size="9" fill="#475569">Mobile (WebView)</text>
  <rect x="155" y="436" width="12" height="12" rx="2" fill="#3b82f6"/>
  <text x="172" y="447" font-family="Arial, sans-serif" font-size="9" fill="#475569">Desktop (Browser)</text>
  <rect x="275" y="436" width="12" height="12" rx="2" fill="#f97316"/>
  <text x="292" y="447" font-family="Arial, sans-serif" font-size="9" fill="#475569">Shared Web App</text>
  <text x="410" y="447" font-family="Arial, sans-serif" font-size="9" fill="#475569" font-weight="bold">Key: Detection rules route same-domain traffic to separate RUM apps</text>
</svg>
