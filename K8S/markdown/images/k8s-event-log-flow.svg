<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <linearGradient id="eventGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="etcdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ingestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pipelineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grailGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1496ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070c9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0f172a"/>

  <!-- Title -->
  <text x="350" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#f1f5f9" text-anchor="middle">Kubernetes Events &amp; Logs Flow to Dynatrace</text>

  <!-- Section: Kubernetes Events (top row) -->
  <text x="40" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f59e0b">Kubernetes Events</text>

  <!-- Event Created -->
  <rect x="40" y="75" width="100" height="55" rx="8" fill="url(#eventGrad)" filter="url(#shadow)"/>
  <text x="90" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Event</text>
  <text x="90" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Created</text>

  <line x1="140" y1="102" x2="165" y2="102" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Stored in etcd -->
  <rect x="170" y="75" width="100" height="55" rx="8" fill="url(#etcdGrad)" filter="url(#shadow)"/>
  <text x="220" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Stored in</text>
  <text x="220" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">etcd</text>

  <!-- Fork: TTL expires vs Dynatrace ingests -->
  <line x1="270" y1="102" x2="295" y2="102" stroke="#94a3b8" stroke-width="2"/>
  <line x1="295" y1="102" x2="295" y2="70" stroke="#ef4444" stroke-width="2"/>
  <line x1="295" y1="70" x2="355" y2="70" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="335" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#fca5a5" text-anchor="middle">TTL expires (1h)</text>

  <!-- Deleted -->
  <rect x="360" y="48" width="80" height="45" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="400" y="73" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#fca5a5" text-anchor="middle">Deleted</text>

  <!-- Dynatrace branch -->
  <line x1="295" y1="102" x2="295" y2="135" stroke="#94a3b8" stroke-width="2"/>
  <line x1="295" y1="135" x2="355" y2="135" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>
  <text x="325" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">ingests</text>

  <!-- Dynatrace Ingests -->
  <rect x="360" y="110" width="100" height="55" rx="8" fill="url(#ingestGrad)" filter="url(#shadow)"/>
  <text x="410" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Dynatrace</text>
  <text x="410" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Ingests</text>

  <line x1="460" y1="137" x2="490" y2="137" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Persisted in Grail -->
  <rect x="495" y="110" width="100" height="55" rx="8" fill="url(#grailGrad)" filter="url(#shadow)"/>
  <text x="545" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Persisted</text>
  <text x="545" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">in Grail</text>

  <!-- Retention badge -->
  <rect x="605" y="115" width="70" height="25" rx="4" fill="#0c4a6e"/>
  <text x="640" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#7dd3fc" text-anchor="middle">35+ days</text>

  <!-- Section: Container Logs (bottom row) -->
  <text x="40" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#22c55e">Container Logs</text>

  <!-- Log Ingest -->
  <rect x="40" y="215" width="100" height="55" rx="8" fill="url(#logGrad)" filter="url(#shadow)"/>
  <text x="90" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Log Ingest</text>
  <text x="90" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#dcfce7" text-anchor="middle">stdout/stderr</text>

  <line x1="140" y1="242" x2="165" y2="242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- OpenPipeline Routing -->
  <rect x="170" y="215" width="110" height="55" rx="8" fill="url(#pipelineGrad)" filter="url(#shadow)"/>
  <text x="225" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">OpenPipeline</text>
  <text x="225" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ddd6fe" text-anchor="middle">Routing</text>

  <line x1="280" y1="242" x2="305" y2="242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Processing -->
  <rect x="310" y="215" width="110" height="55" rx="8" fill="url(#pipelineGrad)" filter="url(#shadow)"/>
  <text x="365" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Processing</text>
  <text x="365" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ddd6fe" text-anchor="middle">Transform, enrich</text>

  <line x1="420" y1="242" x2="450" y2="242" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- Storage -->
  <rect x="455" y="215" width="100" height="55" rx="8" fill="url(#grailGrad)" filter="url(#shadow)"/>
  <text x="505" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Storage</text>
  <text x="505" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#bfdbfe" text-anchor="middle">Grail</text>

  <!-- Pipeline details boxes -->
  <rect x="185" y="280" width="80" height="30" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="225" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Match rules</text>
  <line x1="225" y1="270" x2="225" y2="280" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/>

  <rect x="325" y="280" width="80" height="30" rx="4" fill="#1e293b" stroke="#7c3aed" stroke-width="1"/>
  <text x="365" y="298" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Parse, extract</text>
  <line x1="365" y1="270" x2="365" y2="280" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Key insight -->
  <rect x="40" y="320" width="635" height="25" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="55" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#14b8a6">Key:</text>
  <text x="85" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94a3b8">K8s events have 1h TTL in etcd, but Dynatrace preserves them for 35+ days for analysis and correlation.</text>
</svg>