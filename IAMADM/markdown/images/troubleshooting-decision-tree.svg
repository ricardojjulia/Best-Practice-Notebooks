<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <linearGradient id="tdtBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tdtGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tdtOrangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="tdtShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="tdtArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="tdtArrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="tdtArrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="450" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">Access Issue Troubleshooting</text>
  <text x="350" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Decision tree for diagnosing permission problems</text>

  <!-- Start -->
  <rect x="275" y="65" width="150" height="35" rx="17" fill="url(#tdtBlueGrad)" filter="url(#tdtShadow)"/>
  <text x="350" y="88" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">User reports issue</text>

  <!-- Q1: Can login? -->
  <line x1="350" y1="100" x2="350" y2="120" stroke="#64748b" stroke-width="2"/>
  <rect x="265" y="125" width="170" height="40" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#tdtShadow)"/>
  <text x="350" y="150" font-family="system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Can user login to Dynatrace?</text>

  <!-- No - SSO issue -->
  <line x1="265" y1="145" x2="145" y2="145" stroke="#d97706" stroke-width="2"/>
  <line x1="145" y1="145" x2="145" y2="175" stroke="#d97706" stroke-width="2" marker-end="url(#tdtArrowOrange)"/>
  <text x="205" y="137" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#d97706">NO</text>

  <rect x="60" y="180" width="170" height="50" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tdtShadow)"/>
  <text x="145" y="200" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Check SSO/Auth</text>
  <text x="145" y="215" font-family="system-ui, sans-serif" font-size="9" fill="#a16207" text-anchor="middle">IdP config, SAML, MFA</text>

  <!-- Yes - continue -->
  <line x1="435" y1="145" x2="500" y2="145" stroke="#16a34a" stroke-width="2"/>
  <line x1="500" y1="145" x2="500" y2="175" stroke="#16a34a" stroke-width="2" marker-end="url(#tdtArrowGreen)"/>
  <text x="467" y="137" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">YES</text>

  <!-- Q2: In correct groups? -->
  <rect x="415" y="180" width="170" height="40" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#tdtShadow)"/>
  <text x="500" y="205" font-family="system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">In correct groups?</text>

  <!-- No - Group issue -->
  <line x1="500" y1="220" x2="500" y2="245" stroke="#d97706" stroke-width="2"/>
  <line x1="500" y1="245" x2="400" y2="245" stroke="#d97706" stroke-width="2"/>
  <line x1="400" y1="245" x2="400" y2="270" stroke="#d97706" stroke-width="2" marker-end="url(#tdtArrowOrange)"/>
  <text x="450" y="237" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#d97706">NO</text>

  <rect x="315" y="275" width="170" height="50" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tdtShadow)"/>
  <text x="400" y="295" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Fix Group Membership</text>
  <text x="400" y="310" font-family="system-ui, sans-serif" font-size="9" fill="#a16207" text-anchor="middle">Add to correct group via IdP</text>

  <!-- Yes - continue to policy -->
  <line x1="585" y1="200" x2="630" y2="200" stroke="#16a34a" stroke-width="2"/>
  <line x1="630" y1="200" x2="630" y2="260" stroke="#16a34a" stroke-width="2"/>
  <line x1="630" y1="260" x2="600" y2="260" stroke="#16a34a" stroke-width="2" marker-end="url(#tdtArrowGreen)"/>
  <text x="607" y="230" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">YES</text>

  <!-- Q3: Policy grants access? -->
  <rect x="500" y="270" width="180" height="40" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#tdtShadow)"/>
  <text x="590" y="295" font-family="system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Policy grants access?</text>

  <!-- No - Policy issue -->
  <line x1="590" y1="310" x2="590" y2="340" stroke="#d97706" stroke-width="2" marker-end="url(#tdtArrowOrange)"/>
  <text x="605" y="330" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#d97706">NO</text>

  <rect x="505" y="345" width="170" height="50" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tdtShadow)"/>
  <text x="590" y="365" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Add/Modify Policy</text>
  <text x="590" y="380" font-family="system-ui, sans-serif" font-size="9" fill="#a16207" text-anchor="middle">Grant required permission</text>

  <!-- Yes - check boundary -->
  <line x1="500" y1="290" x2="400" y2="290" stroke="#16a34a" stroke-width="2"/>
  <line x1="400" y1="290" x2="400" y2="330" stroke="#16a34a" stroke-width="2"/>
  <line x1="400" y1="330" x2="250" y2="330" stroke="#16a34a" stroke-width="2" marker-end="url(#tdtArrowGreen)"/>
  <text x="450" y="282" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">YES</text>

  <!-- Q4: Boundary allows? -->
  <rect x="65" y="320" width="180" height="40" rx="4" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#tdtShadow)"/>
  <text x="155" y="345" font-family="system-ui, sans-serif" font-size="10" fill="#1e293b" text-anchor="middle">Boundary includes data?</text>

  <!-- No - Boundary issue -->
  <line x1="155" y1="360" x2="155" y2="390" stroke="#d97706" stroke-width="2" marker-end="url(#tdtArrowOrange)"/>
  <text x="170" y="380" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#d97706">NO</text>

  <rect x="70" y="395" width="170" height="45" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#tdtShadow)"/>
  <text x="155" y="413" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#92400e" text-anchor="middle">Adjust Boundary</text>
  <text x="155" y="428" font-family="system-ui, sans-serif" font-size="9" fill="#a16207" text-anchor="middle">Expand scope/segment</text>

  <!-- Yes - resolved -->
  <line x1="65" y1="340" x2="30" y2="340" stroke="#16a34a" stroke-width="2"/>
  <line x1="30" y1="340" x2="30" y2="415" stroke="#16a34a" stroke-width="2"/>
  <line x1="30" y1="415" x2="65" y2="415" stroke="#16a34a" stroke-width="2" marker-end="url(#tdtArrowGreen)"/>
  <text x="47" y="375" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#16a34a">YES</text>

  <!-- Success -->
  <rect x="260" y="400" width="180" height="40" rx="20" fill="url(#tdtGreenGrad)" filter="url(#tdtShadow)"/>
  <text x="350" y="425" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">Access should work!</text>

  <!-- Legend -->
  <rect x="500" y="410" width="175" height="35" rx="4" fill="#f1f5f9"/>
  <rect x="510" y="418" width="10" height="10" fill="#16a34a"/>
  <text x="525" y="427" font-family="system-ui, sans-serif" font-size="9" fill="#475569">= Continue</text>
  <rect x="580" y="418" width="10" height="10" fill="#d97706"/>
  <text x="595" y="427" font-family="system-ui, sans-serif" font-size="9" fill="#475569">= Fix this</text>
</svg>
