<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="iamHeaderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iamGreenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iamPurpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iamOrangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="iamShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="iamArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="350" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">IAM Governance Framework</text>
  <text x="350" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Roles, responsibilities, and escalation paths</text>

  <!-- Top Row: Governance Roles -->
  <rect x="40" y="70" width="180" height="80" rx="8" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#iamShadow)"/>
  <rect x="40" y="70" width="180" height="28" rx="8" fill="url(#iamHeaderGrad)"/>
  <rect x="40" y="90" width="180" height="8" fill="url(#iamHeaderGrad)"/>
  <text x="130" y="90" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">CISO / Security Lead</text>
  <text x="130" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Policy approval</text>
  <text x="130" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Compliance oversight</text>
  <text x="130" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Break-glass approval</text>

  <rect x="260" y="70" width="180" height="80" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="2" filter="url(#iamShadow)"/>
  <rect x="260" y="70" width="180" height="28" rx="8" fill="url(#iamPurpleGrad)"/>
  <rect x="260" y="90" width="180" height="8" fill="url(#iamPurpleGrad)"/>
  <text x="350" y="90" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">IAM Administrator</text>
  <text x="350" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Group/policy management</text>
  <text x="350" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Access provisioning</text>
  <text x="350" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Audit reviews</text>

  <rect x="480" y="70" width="180" height="80" rx="8" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#iamShadow)"/>
  <rect x="480" y="70" width="180" height="28" rx="8" fill="url(#iamGreenGrad)"/>
  <rect x="480" y="90" width="180" height="8" fill="url(#iamGreenGrad)"/>
  <text x="570" y="90" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Team Lead / Manager</text>
  <text x="570" y="115" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Access requests</text>
  <text x="570" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Team member approval</text>
  <text x="570" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#475569" text-anchor="middle">Periodic review sign-off</text>

  <!-- Arrows -->
  <line x1="220" y1="110" x2="255" y2="110" stroke="#64748b" stroke-width="2" marker-end="url(#iamArrow)"/>
  <line x1="440" y1="110" x2="475" y2="110" stroke="#64748b" stroke-width="2" marker-end="url(#iamArrow)"/>

  <!-- Process Flow -->
  <text x="350" y="185" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Request and Escalation Flow</text>

  <!-- Flow boxes -->
  <rect x="40" y="200" width="120" height="50" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1"/>
  <text x="100" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1" text-anchor="middle">User Request</text>

  <rect x="190" y="200" width="120" height="50" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="250" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">Manager</text>
  <text x="250" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#92400e" text-anchor="middle">Approval</text>

  <rect x="340" y="200" width="120" height="50" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="400" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9" text-anchor="middle">IAM Admin</text>
  <text x="400" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9" text-anchor="middle">Provision</text>

  <rect x="490" y="200" width="120" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="550" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Access</text>
  <text x="550" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#166534" text-anchor="middle">Granted</text>

  <!-- Flow arrows -->
  <line x1="160" y1="225" x2="185" y2="225" stroke="#64748b" stroke-width="2" marker-end="url(#iamArrow)"/>
  <line x1="310" y1="225" x2="335" y2="225" stroke="#64748b" stroke-width="2" marker-end="url(#iamArrow)"/>
  <line x1="460" y1="225" x2="485" y2="225" stroke="#64748b" stroke-width="2" marker-end="url(#iamArrow)"/>

  <!-- Escalation path -->
  <rect x="340" y="275" width="120" height="40" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="400" y="300" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c" text-anchor="middle">Escalate to CISO</text>

  <line x1="400" y1="250" x2="400" y2="273" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#iamArrow)"/>
  <text x="420" y="265" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">if denied</text>

  <!-- Key metrics -->
  <rect x="40" y="330" width="200" height="55" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="140" y="350" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">Standard Access</text>
  <text x="140" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SLA: 24-48 hours</text>

  <rect x="250" y="330" width="200" height="55" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="350" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">Privileged Access</text>
  <text x="350" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SLA: 3-5 business days</text>

  <rect x="460" y="330" width="200" height="55" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="560" y="350" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle">Emergency Access</text>
  <text x="560" y="370" font-family="system-ui, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">SLA: Immediate (with approval)</text>
</svg>
