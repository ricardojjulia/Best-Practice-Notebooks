<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="saasGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="agGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="hostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="18" font-weight="bold">SaaS Network Architecture</text>

  <!-- Cloud Section (SaaS) -->
  <g transform="translate(450, 50)">
    <rect width="220" height="110" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="110" y="20" text-anchor="middle" fill="#a5b4fc" font-family="Arial, sans-serif" font-size="10">DYNATRACE CLOUD</text>

    <rect x="35" y="35" width="150" height="55" rx="8" fill="url(#saasGrad)" filter="url(#shadow)"/>
    <text x="110" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Dynatrace SaaS</text>
    <text x="110" y="78" text-anchor="middle" fill="#c7d2fe" font-family="Arial, sans-serif" font-size="10">{tenant}.live.dynatrace.com</text>
  </g>

  <!-- Customer Network Section -->
  <g transform="translate(20, 175)">
    <rect width="650" height="200" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <text x="325" y="20" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">CUSTOMER NETWORK</text>

    <!-- Firewall -->
    <g transform="translate(530, 35)">
      <rect width="80" height="50" rx="4" fill="#334155" stroke="#f97316" stroke-width="2"/>
      <text x="40" y="25" text-anchor="middle" fill="#f97316" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Firewall</text>
      <text x="40" y="40" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Port 443</text>
    </g>

    <!-- ActiveGate -->
    <g transform="translate(330, 55)">
      <rect width="140" height="70" rx="8" fill="url(#agGrad)" filter="url(#shadow)"/>
      <text x="70" y="28" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ActiveGate</text>
      <text x="70" y="45" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">(Optional)</text>
      <text x="70" y="60" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">Port 9999</text>
    </g>

    <!-- Hosts with OneAgent -->
    <g transform="translate(30, 100)">
      <!-- Host 1 -->
      <rect width="90" height="70" rx="6" fill="url(#hostGrad)" filter="url(#shadow)"/>
      <text x="45" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Host 1</text>
      <rect x="10" y="35" width="70" height="25" rx="4" fill="#3b82f6"/>
      <text x="45" y="52" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9">OneAgent</text>

      <!-- Host 2 -->
      <g transform="translate(105, 0)">
        <rect width="90" height="70" rx="6" fill="url(#hostGrad)" filter="url(#shadow)"/>
        <text x="45" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Host 2</text>
        <rect x="10" y="35" width="70" height="25" rx="4" fill="#3b82f6"/>
        <text x="45" y="52" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9">OneAgent</text>
      </g>

      <!-- Host 3 -->
      <g transform="translate(210, 0)">
        <rect width="90" height="70" rx="6" fill="url(#hostGrad)" filter="url(#shadow)"/>
        <text x="45" y="25" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Host 3</text>
        <rect x="10" y="35" width="70" height="25" rx="4" fill="#3b82f6"/>
        <text x="45" y="52" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="9">OneAgent</text>
      </g>
    </g>
  </g>

  <!-- Connection Lines -->
  <!-- Hosts to ActiveGate -->
  <path d="M120 335 Q200 290 395 285" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <path d="M225 335 Q300 300 395 285" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>
  <path d="M330 335 L395 285" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="4,2"/>

  <!-- ActiveGate to Firewall -->
  <path d="M490 265 L570 255" stroke="#14b8a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Firewall to SaaS -->
  <path d="M590 195 L590 145" stroke="#14b8a6" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Direct connection option (dotted) -->
  <path d="M200 315 Q350 170 510 145" stroke="#f97316" stroke-width="1" fill="none" stroke-dasharray="8,4"/>
  <text x="310" y="200" fill="#f97316" font-family="Arial, sans-serif" font-size="9">Direct (optional)</text>

  <!-- Legend -->
  <g transform="translate(30, 55)">
    <rect width="160" height="95" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="80" y="18" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Connection Options</text>

    <line x1="15" y1="35" x2="45" y2="35" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="55" y="38" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Via ActiveGate</text>

    <line x1="15" y1="55" x2="45" y2="55" stroke="#f97316" stroke-width="1" stroke-dasharray="8,4"/>
    <text x="55" y="58" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Direct to SaaS</text>

    <line x1="15" y1="75" x2="45" y2="75" stroke="#14b8a6" stroke-width="2"/>
    <text x="55" y="78" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">AG to SaaS</text>
  </g>
</svg>
